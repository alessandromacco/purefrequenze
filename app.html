function PureFrequenzeApp() {
    const [showLanding, setShowLanding] = useState(true);
    const [showTutorial, setShowTutorial] = useState(false);
    const [activeTab, setActiveTab] = useState('frequencies');
    const [selectedFreq, setSelectedFreq] = useState(432);
    const [selectedGroup, setSelectedGroup] = useState('deep_contemplation');
    const [selectedTrackIndex, setSelectedTrackIndex] = useState(0);
    const [selectedBinaural, setSelectedBinaural] = useState(null);
    const [binauralMode, setBinauralMode] = useState(null);
    const [isPlaying, setIsPlaying] = useState(false);
    const [currentTime, setCurrentTime] = useState(0);
    const [duration, setDuration] = useState(0);
    const [volume, setVolume] = useState(0.7);
    const [binauralVolume, setBinauralVolume] = useState(0.15);
    const [shuffle, setShuffle] = useState(false);
    const [repeat, setRepeat] = useState(false);
    const [showTechNote, setShowTechNote] = useState(false);
    
    const audioRef = useRef(null);
    const audioContextRef = useRef(null);
    const oscillatorLeftRef = useRef(null);
    const oscillatorRightRef = useRef(null);
    const gainNodeRef = useRef(null);
    const trackGainRef = useRef(null);

    // Inizializza Audio Context
    useEffect(() => {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioContextRef.current = new AudioContext();
        gainNodeRef.current = audioContextRef.current.createGain();
        gainNodeRef.current.connect(audioContextRef.current.destination);
        
        return () => {
            stopBinauralOscillators();
            if (audioContextRef.current) {
                audioContextRef.current.close();
            }
        };
    }, []);

    // Funzioni oscillatori binaurali
    const startBinauralOscillators = (binauralFreq) => {
        stopBinauralOscillators();
        
        if (!audioContextRef.current) return;
        
        const baseFreq = 200;
        const ctx = audioContextRef.current;
        
        const oscLeft = ctx.createOscillator();
        oscLeft.frequency.value = baseFreq;
        oscLeft.type = 'sine';
        
        const panLeft = ctx.createStereoPanner();
        panLeft.pan.value = -1;
        
        const gainLeft = ctx.createGain();
        gainLeft.gain.value = binauralVolume;
        
        oscLeft.connect(gainLeft);
        gainLeft.connect(panLeft);
        panLeft.connect(gainNodeRef.current);
        
        const oscRight = ctx.createOscillator();
        oscRight.frequency.value = baseFreq + binauralFreq;
        oscRight.type = 'sine';
        
        const panRight = ctx.createStereoPanner();
        panRight.pan.value = 1;
        
        const gainRight = ctx.createGain();
        gainRight.gain.value = binauralVolume;
        
        oscRight.connect(gainRight);
        gainRight.connect(panRight);
        panRight.connect(gainNodeRef.current);
        
        oscLeft.start();
        oscRight.start();
        
        oscillatorLeftRef.current = oscLeft;
        oscillatorRightRef.current = oscRight;
    };

    const stopBinauralOscillators = () => {
        if (oscillatorLeftRef.current) {
            try {
                oscillatorLeftRef.current.stop();
            } catch (e) {}
            oscillatorLeftRef.current = null;
        }
        if (oscillatorRightRef.current) {
            try {
                oscillatorRightRef.current.stop();
            } catch (e) {}
            oscillatorRightRef.current = null;
        }
    };

    // Seleziona traccia random all'avvio
    useEffect(() => {
        if (!showLanding && selectedTrackIndex === 0) {
            const groups = Object.keys(TRACK_DATABASE);
            const randomGroup = groups[Math.floor(Math.random() * groups.length)];
            const tracks = TRACK_DATABASE[randomGroup].tracks;
            const randomIndex = Math.floor(Math.random() * tracks.length);
            
            setSelectedGroup(randomGroup);
            setSelectedTrackIndex(randomIndex);
        }
    }, [showLanding]);

    // Audio URL
    const getAudioURL = () => {
        const track = TRACK_DATABASE[selectedGroup]?.tracks[selectedTrackIndex];
        if (!track) return null;
        return `${WORKER_URL}/${selectedGroup}/${track.id}_${selectedFreq}Hz.mp3`;
    };

    // Play/Pause con gestione binaurale
    useEffect(() => {
        const audio = audioRef.current;
        
        if (binauralMode === 'pure' && selectedBinaural) {
            stopBinauralOscillators();
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
            }
            
            if (isPlaying) {
                const wave = BINAURAL_WAVES[selectedBinaural];
                startBinauralOscillators(wave.freq);
            }
            return;
        }
        
        if (!audio) return;
        
        const url = getAudioURL();
        
        if (url && audio.src !== url) {
            audio.src = url;
            audio.load();
        }
        
        if (isPlaying && url) {
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise
                    .then(() => {
                        if (binauralMode === 'hybrid' && selectedBinaural) {
                            const wave = BINAURAL_WAVES[selectedBinaural];
                            startBinauralOscillators(wave.freq);
                        }
                    })
                    .catch(e => console.error('Play error:', e));
            }
        } else {
            audio.pause();
            stopBinauralOscillators();
        }
    }, [isPlaying, selectedFreq, selectedGroup, selectedTrackIndex, selectedBinaural, binauralMode]);

    // Time update
    useEffect(() => {
        const audio = audioRef.current;
        if (!audio) return;

        const updateTime = () => {
            if (binauralMode !== 'pure') {
                setCurrentTime(audio.currentTime);
            }
        };
        const updateDuration = () => {
            if (binauralMode !== 'pure') {
                setDuration(audio.duration);
            }
        };
        const handleEnded = () => {
            if (repeat) {
                audio.currentTime = 0;
                audio.play();
            } else {
                handleNext();
            }
        };
        
        audio.addEventListener('timeupdate', updateTime);
        audio.addEventListener('loadedmetadata', updateDuration);
        audio.addEventListener('ended', handleEnded);
        
        return () => {
            audio.removeEventListener('timeupdate', updateTime);
            audio.removeEventListener('loadedmetadata', updateDuration);
            audio.removeEventListener('ended', handleEnded);
        };
    }, [repeat, binauralMode]);

    // Volume
    useEffect(() => {
        if (audioRef.current) {
            audioRef.current.volume = volume;
        }
        if (gainNodeRef.current) {
            gainNodeRef.current.gain.value = volume;
        }
    }, [volume]);

    const formatTime = (seconds) => {
        if (!seconds || isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    };

    const handleProgressClick = (e) => {
        if (binauralMode === 'pure') return;
        const bar = e.currentTarget;
        const rect = bar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        const newTime = percent * duration;
        const audio = audioRef.current;
        if (audio && !isNaN(newTime) && isFinite(newTime)) {
            audio.currentTime = newTime;
            setCurrentTime(newTime);
        }
    };

    const handleVolumeClick = (e) => {
        const bar = e.currentTarget;
        const rect = bar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        setVolume(Math.max(0, Math.min(1, percent)));
    };

    const handleBinauralVolumeClick = (e) => {
        const bar = e.currentTarget;
        const rect = bar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        setBinauralVolume(Math.max(0, Math.min(1, percent)));
    };

    const handleStart = () => {
        setShowLanding(false);
        setShowTutorial(true);
    };

    const handleCloseTutorial = () => {
        setShowTutorial(false);
        setIsPlaying(true);
    };

    const handleFreqSelect = (freq) => {
        setSelectedFreq(freq);
        setBinauralMode(null);
        setSelectedBinaural(null);
        setIsPlaying(true);
    };

    const handleGroupSelect = (groupKey) => {
        setSelectedGroup(groupKey);
        setSelectedTrackIndex(0);
        setBinauralMode(null);
        setSelectedBinaural(null);
    };

    const handleTrackSelect = (index) => {
        setSelectedTrackIndex(index);
        setBinauralMode(null);
        setSelectedBinaural(null);
        setIsPlaying(true);
    };

    const handleBinauralSelect = (waveKey, mode) => {
        setSelectedBinaural(waveKey);
        setBinauralMode(mode);
        setIsPlaying(true);
    };

    const handleApplicationBadge = (freq, isBinaural = false) => {
        if (isBinaural) {
            handleBinauralSelect(freq, 'hybrid');
        } else {
            setSelectedFreq(freq);
            setBinauralMode(null);
            setSelectedBinaural(null);
            setIsPlaying(true);
        }
    };

    const handleNext = () => {
        const tracks = TRACK_DATABASE[selectedGroup].tracks;
        let nextIndex;
        
        if (shuffle) {
            nextIndex = Math.floor(Math.random() * tracks.length);
        } else {
            nextIndex = (selectedTrackIndex + 1) % tracks.length;
        }
        
        setSelectedTrackIndex(nextIndex);
        setIsPlaying(true);
    };

    const handlePrev = () => {
        const tracks = TRACK_DATABASE[selectedGroup].tracks;
        let prevIndex;
        
        if (shuffle) {
            prevIndex = Math.floor(Math.random() * tracks.length);
        } else {
            prevIndex = selectedTrackIndex === 0 ? tracks.length - 1 : selectedTrackIndex - 1;
        }
        
        setSelectedTrackIndex(prevIndex);
        setIsPlaying(true);
    };

    const currentTrack = TRACK_DATABASE[selectedGroup]?.tracks[selectedTrackIndex];
    const currentFreq = FREQUENCIES[selectedFreq];

    if (showLanding) {
        return (
            <div className="landing-screen">
                <h1 className="landing-title">PureFrequenze</h1>
                <p className="landing-description">
                    PureFrequenze utilizza frequenze Solfeggio e battimenti binaurali per influenzare l'attività delle onde cerebrali attraverso principi di risonanza acustica e neuroentrainment. Un approccio misurabile basato su fenomeni neurofisiologici documentati.
                </p>
                <div className="landing-features">
                    <div className="landing-feature">
                        <svg className="feature-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                        10 frequenze Solfeggio calibrate
                    </div>
                    <div className="landing-feature">
                        <svg className="feature-icon" viewBox="0 0 24 24"><path d="M12 2l-5.5 9h11z"/><path d="M17.5 17c0 .83-.67 1.5-1.5 1.5H8c-.83 0-1.5-.67-1.5-1.5v-4h11v4z"/></svg>
                        43 composizioni sonore professionali
                    </div>
                    <div className="landing-feature">
                        <svg className="feature-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                        Battimenti binaurali per neuroentrainment
                    </div>
                </div>
                <button className="landing-cta" onClick={handleStart}>
                    Inizia
                </button>
            </div>
        );
    }

    return (
        <>
            <audio ref={audioRef} preload="metadata" />
            
            {showTutorial && (
                <div className="tutorial-overlay">
                    <div className="tutorial-modal">
                        <h2 className="tutorial-title">Come Funziona PureFrequenze</h2>
                        
                        <div className="tutorial-section">
                            <div className="tutorial-section-title">Frequenze Solfeggio (174-963 Hz)</div>
                            <div className="tutorial-section-text">
                                Toni specifici associati a effetti neurofisiologici documentati. Selezionare in base all'obiettivo ricercato.
                            </div>
                        </div>

                        <div className="tutorial-section">
                            <div className="tutorial-section-title">Stili Sonori</div>
                            <div className="tutorial-section-text">
                                Sei categorie di composizioni progettate per contesti d'uso differenti: meditazione profonda, concentrazione, immersione naturale, esplorazione sonora, tradizioni contemplative, minimalismo.
                            </div>
                        </div>

                        <div className="tutorial-section">
                            <div className="tutorial-section-title">Battimenti Binaurali</div>
                            <div className="tutorial-section-text">
                                Stimolazione delle onde cerebrali attraverso differenza di frequenza tra i due canali audio. Richiede cuffie stereo.
                            </div>
                        </div>

                        <p className="tutorial-section-text" style={{marginTop: '1.5rem'}}>
                            Le sessioni hanno durata standard di 10 minuti.
                        </p>

                        <button className="tutorial-close" onClick={handleCloseTutorial}>
                            Inizia l'Esplorazione
                        </button>
                    </div>
                </div>
            )}

            <div className="app-container">
                <div className="header">
                    <h1 className="logo">PUREFREQUENZE</h1>
                    <p className="tagline">FREQUENZE SOLFEGGIO E NEUROENTRAINMENT</p>
                </div>

                <div className="main-layout">
                    {/* PLAYER */}
                    <div className="player-card">
                        <div 
                            className="cover-art" 
                            style={{
                                background: binauralMode ? 
                                    `linear-gradient(135deg, #9c27b022, #9c27b055)` :
                                    `linear-gradient(135deg, ${currentFreq.color}22, ${currentFreq.color}55)`,
                                color: binauralMode ? '#9c27b0' : currentFreq.color

                        >
                            <div className={`cymatics-wave ${!isPlaying ? 'paused' : ''}`}></div>
                            <div className={`cymatics-wave ${!isPlaying ? 'paused' : ''}`}></div>
                            <div className={`cymatics-wave ${!isPlaying ? 'paused' : ''}`}></div>
                            <div className={`cymatics-wave ${!isPlaying ? 'paused' : ''}`}></div>
                            <svg className="cover-icon" viewBox="0 0 24 24" fill={binauralMode ? '#9c27b0' : currentFreq.color}>

                            >
                                {binauralMode === 'pure' && selectedBinaural ? 
                                    `${BINAURAL_WAVES[selectedBinaural].name} ${BINAURAL_WAVES[selectedBinaural].freq}Hz` :
                                    `${selectedFreq} Hz`

                            </div>
                            <h2 className="track-name">
                                {binauralMode === 'pure' ? 
                                    'Battimenti Binaurali' :

                                    `${currentTrack?.name || "Traccia"} + ${BINAURAL_WAVES[selectedBinaural]?.name}` :

                            <p className="track-subtitle">
                                {binauralMode === 'pure' ?
                                    BINAURAL_WAVES[selectedBinaural]?.desc || 'Seleziona onda' :
                                    binauralMode === 'hybrid' ?
                                    'Modalità Ibrida' :
                                    TRACK_DATABASE[selectedGroup].name
                                }
                            </p>
                        </div>

                        <div className="progress-container">
                            <div className="progress-bar" onClick={handleProgressClick}>
                                <div 
                                    className="progress-fill"

                                />
                            </div>

                                <span>{binauralMode === 'pure' ? '--:--' : formatTime(currentTime)}</span>

                        <div className="controls">

                                className={`control-btn ${shuffle ? 'active' : ''}`}

                                title="Shuffle"

                                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>

                            <button

                            </button>

                            <button 
                                className={`control-btn ${repeat ? 'active' : ''}`}
                                onClick={() => setRepeat(!repeat)}
                                title="Ripeti"
                            >
                                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                            </button>
                        </div>

                        <div className="volume-control">
                            <svg className="volume-icon" viewBox="0 0 24 24">
                                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                            </svg>
                            <div className="volume-slider" onClick={handleVolumeClick}>
                                <div 
                                    className="volume-fill" 
                                    style={{width: `${volume * 100}%`}}
                                />
                            </div>
                        </div>

                        {(binauralMode === 'hybrid' || binauralMode === 'pure') && (
                            <div className="volume-control" style={{marginTop: '0.8rem'}}>
                                <svg className="volume-icon" viewBox="0 0 24 24" fill="#9c27b0">
                                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <div className="volume-slider" onClick={handleBinauralVolumeClick}>
                                    <div 
                                        className="volume-fill" 
                                        style={{width: `${binauralVolume * 100}%`, background: 'linear-gradient(90deg, #9c27b0, #7b1fa2)'}}
                                    />
                                </div>
                            </div>
                        )}
                    </div>

                    {/* CONTROLS COLUMN */}
                    <div>
                        {/* TABS */}
                        <div className="tabs">
                            <button 
                                className={`tab ${activeTab === 'frequencies' ? 'active' : ''}`}
                                onClick={() => setActiveTab('frequencies')}
                            >
                                Frequenze
                            </button>
                            <button 
                                className={`tab ${activeTab === 'groups' ? 'active' : ''}`}
                                onClick={() => setActiveTab('groups')}
                            >
                                Stili Sonori
                            </button>
                            <button 
                                className={`tab ${activeTab === 'binaurals' ? 'active' : ''}`}
                                onClick={() => setActiveTab('binaurals')}
                            >
                                Binaurali
                            </button>
                            <button 
                                className={`tab ${activeTab === 'applications' ? 'active' : ''}`}
                                onClick={() => setActiveTab('applications')}
                            >
                                Applicazioni
                            </button>
                        </div>

                        {/* APPLICATIONS */}
                        {activeTab === 'applications' && (
                            <div className="section">
                                {Object.entries(APPLICATIONS).map(([key, category]) => (
                                    <div key={key} className="app-category">
                                        <h3 className="app-category-title">
                                            <svg className="app-category-icon" viewBox="0 0 24 24">
                                                <path d={category.icon} />
                                            </svg>
                                            {category.title}
                                        </h3>
                                        <div className="app-objectives">
                                            {category.objectives.map((obj, idx) => (
                                                <div key={idx} className="app-objective">
                                                    <div className="app-objective-name">{obj.name}</div>
                                                    <div className="app-badges">
                                                        {obj.freqs.map(freq => (
                                                            <span
                                                                key={freq}
                                                                className="freq-badge-small"
                                                                onClick={() => handleApplicationBadge(freq, false)}
                                                            >
                                                                {freq} Hz
                                                            </span>
                                                        ))}
                                                        {obj.binaural?.map(wave => (
                                                            <span
                                                                key={wave}
                                                                className="freq-badge-small binaural-badge-small"
                                                                onClick={() => handleApplicationBadge(wave, true)}
                                                            >
                                                                {BINAURAL_WAVES[wave].name}
                                                            </span>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* FREQUENCIES */}
                        {activeTab === 'frequencies' && (
                            <div className="section">
                                <button className="info-btn" onClick={() => setShowTechNote(true)}>
                                    <svg viewBox="0 0 24 24">
                                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                                    </svg>
                                </button>
                                <div className="freq-grid">
                                    {Object.values(FREQUENCIES).map(freq => (
                                        <div
                                            key={freq.hz}
                                            className={`freq-item ${selectedFreq === freq.hz && !binauralMode ? 'active' : ''}`}
                                            onClick={() => handleFreqSelect(freq.hz)}
                                            style={{
                                                borderColor: selectedFreq === freq.hz && !binauralMode ? freq.color : undefined
                                            }}
                                        >
                                            <div className="freq-hz" style={{color: freq.color}}>
                                                {freq.hz} Hz
                                            </div>
                                            <div className="freq-desc">{freq.desc}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* GROUPS & TRACKS */}
                        {activeTab === 'groups' && (
                            <div className="section">
                                <h3 className="section-title">Gruppi</h3>
                                <div className="groups-grid">
                                    {Object.entries(TRACK_DATABASE).map(([key, group]) => (
                                        <div
                                            key={key}
                                            className={`group-item ${selectedGroup === key ? 'active' : ''}`}
                                            onClick={() => handleGroupSelect(key)}
                                        >
                                            <div className="group-name">{group.name}</div>
                                            <div className="group-desc">{group.desc}</div>
                                        </div>
                                    ))}
                                </div>

                                <h3 className="section-title" style={{marginTop: '2rem'}}>Tracce</h3>
                                <div className="track-list">
                                    {TRACK_DATABASE[selectedGroup].tracks.map((track, index) => (
                                        <div
                                            key={track.id}
                                            className={`track-item ${selectedTrackIndex === index && !binauralMode ? 'active' : ''}`}
                                            onClick={() => handleTrackSelect(index)}
                                        >
                                            <div className="track-number">{index + 1}</div>
                                            <div className="track-title">{track.name}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* BINAURALS */}
                        {activeTab === 'binaurals' && (
                            <div className="section">
                                <div className="binaural-intro">
                                    I battimenti binaurali sono generati dalla differenza di frequenza tra due toni presentati separatamente a ciascun orecchio. Il cervello percepisce una terza frequenza corrispondente alla differenza tra le due, inducendo sincronizzazione delle onde cerebrali alla frequenza risultante.
                                    
                                    <div className="binaural-requirement">
                                        Requisito tecnico: Utilizzare esclusivamente con cuffie stereo.
                                    </div>
                                </div>

                                <h3 className="section-title">Modalità</h3>
                                <div className="mode-selector">
                                    <div 
                                        className={`mode-btn ${binauralMode === 'pure' ? 'active' : ''}`}
                                        onClick={() => {
                                            const newMode = binauralMode === 'pure' ? null : 'pure';
                                            setBinauralMode(newMode);
                                            if (newMode === null) {
                                                stopBinauralOscillators();
                                                setSelectedBinaural(null);
                                            }
                                        }}
                                    >
                                        <div className="mode-title">Modalità Pura</div>
                                        <div className="mode-desc">Solo battimenti binaurali</div>
                                    </div>
                                    <div 
                                        className={`mode-btn ${binauralMode === 'hybrid' ? 'active' : ''}`}
                                        onClick={() => {
                                            const newMode = binauralMode === 'hybrid' ? null : 'hybrid';
                                            setBinauralMode(newMode);
                                            if (newMode === null) {
                                                stopBinauralOscillators();
                                                setSelectedBinaural(null);
                                            }
                                        }}
                                    >
                                        <div className="mode-title">Modalità Ibrida</div>
                                        <div className="mode-desc">Battimenti + Frequenza Solfeggio</div>
                                    </div>
                                </div>

                                <h3 className="section-title">Onde Cerebrali</h3>
                                <div className="binaural-modes">
                                    {Object.entries(BINAURAL_WAVES).map(([key, wave]) => (
                                        <div
                                            key={key}
                                            className={`binaural-card ${selectedBinaural === key && binauralMode ? 'active' : ''}`}
                                            onClick={() => binauralMode && handleBinauralSelect(key, binauralMode)}
                                        >
                                            <div className="wave-name" style={{color: wave.color}}>
                                                {wave.name}
                                            </div>
                                            <div className="wave-range">{wave.range}</div>
                                            <div className="wave-desc">{wave.desc}</div>
                                            
                                            {binauralMode && (
                                                <div className="tooltip">
                                                    <div className="tooltip-title">{wave.name} ({wave.range})</div>
                                                    <div className="tooltip-text">{wave.tooltip}</div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                <a 
                                    href="https://purefrequenze.com/scienza.html#binaurali" 
                                    target="_blank"
                                    className="binaural-link"
                                    style={{marginTop: '2rem'}}
                                >
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                                    </svg>
                                    Approfondimenti scientifici
                                </a>
                            </div>
                        )}
                    </div>
                </div>
            </div>
            
            {/* MODAL NOTA TECNICA */}
            {showTechNote && (
                <div className="tech-note-modal" onClick={() => setShowTechNote(false)}>
                    <div className="tech-note-content" onClick={(e) => e.stopPropagation()}>
                        <h3 className="tech-note-title">Nota Tecnica</h3>
                        <p className="tech-note-text">
                            Le tracce audio sono state processate tramite pitch shifting per raggiungere le frequenze Solfeggio target. Lievi artefatti sonori possono essere percepibili a causa della natura del processo di trasposizione, particolarmente evidente nelle frequenze più distanti dall'accordatura standard.
                        </p>
                        <p className="tech-note-text" style={{marginTop: '1rem', fontSize: '0.9rem', color: '#9fa8da'}}>
                            L'adattamento percettivo avviene entro pochi secondi dall'esposizione: il sistema uditivo richiede un breve periodo di entrainment neurale per sincronizzarsi con la nuova frequenza e stabilire la risonanza acustica.
                        </p>
                        <button className="tech-note-close" onClick={() => setShowTechNote(false)} style={{marginTop: '1rem'}}>
                            Chiudi
                        </button>
                    </div>
                </div>
            )}
        </>
    );
}

ReactDOM.render(<PureFrequenzeApp />, document.getElementById('root'));
</script>
</body>
</html>
