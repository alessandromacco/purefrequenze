    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --freq-174: #8B0000; --freq-285: #FF4500; --freq-396: #FFD700;
            --freq-417: #90EE90; --freq-432: #4169E1; --freq-528: #00CED1;

            --freq-963: #E6E6FA;
        }

        body {

        }

        .background-effects { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .orb { position:absolute; border-radius:50%; filter:blur(100px); opacity:0.15; animation:float 25s infinite ease-in-out; }
        .orb-1 { width:600px; height:600px; background:radial-gradient(circle,#1e3a8a,transparent); top:-100px; left:-100px; }
        .orb-2 { width:700px; height:700px; background:radial-gradient(circle,#7c3aed,transparent); bottom:-150px; right:-150px; animation-delay:8s; }
        .orb-3 { width:500px; height:500px; background:radial-gradient(circle,#0891b2,transparent); top:40%; left:40%; animation-delay:15s; }
        @keyframes float { 0%,100%{transform:translate(0,0) scale(1);opacity:.15} 33%{transform:translate(80px,-120px) scale(1.2);opacity:.22} 66%{transform:translate(-60px,100px) scale(.9);opacity:.18} }

        .app-container { max-width:1800px; margin:0 auto; padding:2rem; position:relative; z-index:1; }

        /* ── ONBOARDING ── */
        .onboarding-overlay {
            position: fixed; inset: 0; z-index: 500;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0a0e27 100%);
            display: flex; align-items: flex-start; justify-content: center;
            padding: 2rem 1rem 150px 1rem;
            overflow-y: auto;

        .onboarding-box {

            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 28px; padding: 2rem 1.5rem;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            animation: slideUp 0.5s ease;
            margin: auto;
        }
        @media(max-width:768px){
            .onboarding-box { padding: 2rem 1.5rem; }
        }
        @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }

        .onb-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; font-weight: 700; text-align: center; margin-bottom: 0.4rem;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;

        .onb-subtitle { text-align:center; color:rgba(255,255,255,0.55); font-size:0.9rem; margin-bottom:2.5rem; line-height:1.6; }

        .onb-progress { display:flex; gap:8px; margin-bottom:2.5rem; justify-content:center; }
        .onb-dot { height:3px; width:40px; border-radius:3px; background:rgba(255,255,255,0.1); transition:background 0.3s; }
        .onb-dot.done { background:#8b5cf6; }
        .onb-dot.active { background:rgba(139,92,246,0.5); }

        .onb-step { display:none; }
        .onb-step.active { display:block; animation:fadeIn .3s ease; }

        .onb-options { display:flex; flex-direction:column; gap:10px; }

        .onb-option.selected { border-color:#8b5cf6; background:rgba(139,92,246,0.15); color:#c084fc; }

        .trial-banner {

            border: 1px solid rgba(107,127,212,0.25);

        .expired-free:hover { color:rgba(255,255,255,0.7); }

        .badge-lock { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.35); border:1px solid rgba(255,255,255,0.1); }

        /* ── TUTTO IL RESTO: identico all'originale ── */
        .header { text-align:center; padding:2rem 0; margin-bottom:3rem; }
        .logo {
            font-family:'Inter',sans-serif; font-size:90px; font-weight:900; letter-spacing:18px; color:#ffffff;

        .main-layout { display:grid; grid-template-columns:500px 1fr; gap:3rem; align-items:start; }

        .cover-art::after { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:linear-gradient(45deg,transparent,rgba(255,255,255,.15),transparent); transform:rotate(45deg); animation:shimmer 4s infinite; }

        .track-info { text-align:center; margin-bottom:2.5rem; }

        .progress-container { margin:2.5rem 0; }
        .progress-bar { width:100%; height:12px; background:rgba(255,255,255,.08); border-radius:10px; cursor:pointer; position:relative; overflow:hidden; box-shadow:inset 0 2px 8px rgba(0,0,0,.3); }
        .progress-fill { height:100%; background:linear-gradient(90deg,var(--freq-528),#8b5cf6); border-radius:10px; transition:width .1s ease; box-shadow:0 0 20px rgba(0,206,209,.6); }
        .progress-fill::after { content:''; position:absolute; right:0; top:50%; transform:translateY(-50%); width:20px; height:20px; background:white; border-radius:50%; box-shadow:0 2px 10px rgba(0,0,0,.4),0 0 15px rgba(255,255,255,.5); }
        .time-info { display:flex; justify-content:space-between; margin-top:1.2rem; color:rgba(255,255,255,.5); font-size:1rem; font-weight:500; }
        .player-controls { display:flex; justify-content:center; align-items:center; gap:2.5rem; margin:2.5rem 0; }
        .control-btn { background:none; border:none; color:white; cursor:pointer; transition:all .4s; padding:0; display:flex; align-items:center; justify-content:center; }

        .control-btn:hover { transform:scale(1.15) translateY(-2px); filter:drop-shadow(0 8px 20px rgba(139,92,246,.6)); }
        .control-btn.active { color:#8b5cf6; }

        .secondary-controls { display:flex; justify-content:center; gap:2rem; margin-top:2rem; }
        .secondary-controls .control-btn svg { width:24px; height:24px; }
        .volume-control { display:flex; align-items:center; gap:.8rem; }

        .volume-slider::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#8b5cf6; cursor:pointer; box-shadow:0 0 10px rgba(139,92,246,.5); }
        .tabs-column { min-height:600px; }
        .tabs-header { display:flex; gap:1rem; margin-bottom:2.5rem; border-bottom:1px solid rgba(255,255,255,.08); }
        .tab-button { background:none; border:none; color:rgba(255,255,255,.5); padding:1.2rem 2.5rem; font-size:1.05rem; font-weight:600; cursor:pointer; transition:all .3s; border-bottom:3px solid transparent; font-family:inherit; position:relative; }
        .tab-button::before { content:''; position:absolute; bottom:-1px; left:0; right:0; height:3px; background:linear-gradient(90deg,#8b5cf6,#6366f1); transform:scaleX(0); transition:transform .3s; border-radius:3px 3px 0 0; }
        .tab-button:hover { color:rgba(255,255,255,.8); }
        .tab-button.active { color:#c084fc; }
        .tab-button.active::before { transform:scaleX(1); }
        .tab-content { background:linear-gradient(135deg,rgba(30,20,60,.5),rgba(20,15,45,.4)); backdrop-filter:blur(30px); border:1px solid rgba(139,92,246,.2); border-radius:28px; padding:2.5rem; box-shadow:0 20px 60px rgba(0,0,0,.5); }
        .freq-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1.5rem; }
        .freq-item { background:linear-gradient(135deg,rgba(30,20,50,.4),rgba(20,15,35,.3)); border:2px solid transparent; border-radius:18px; padding:2rem; cursor:pointer; transition:all .4s; position:relative; overflow:hidden; }
        .freq-item::before { content:''; position:absolute; top:0; left:0; right:0; height:5px; background:var(--freq-color); transform:scaleX(0); transition:transform .4s; }
        .freq-item:hover::before { transform:scaleX(1); }

        .freq-item h3 { font-size:2.2rem; color:var(--freq-color); margin-bottom:.8rem; font-weight:700; }
        .freq-item .description { color:rgba(255,255,255,.75); font-size:.95rem; line-height:1.6; }
        .freq-item.locked { opacity:0.5; cursor:pointer; }
        .track-groups { display:grid; gap:2rem; margin-top:2rem; }

        .track-group-icon { width:48px; height:48px; stroke:#8b5cf6; fill:none; stroke-width:2; filter:drop-shadow(0 2px 8px rgba(139,92,246,.4)); }

        .track-item h4 { font-size:1.05rem; margin-bottom:.4rem; }
        .track-item p { font-size:.9rem; color:rgba(255,255,255,.5); }
        .premium-badge { position:absolute; top:1rem; right:1rem; width:24px; height:24px; display:flex; align-items:center; justify-content:center; background:rgba(139,92,246,.15); border-radius:50%; }

        .upgrade-modal { background:linear-gradient(135deg,rgba(30,20,50,.98),rgba(20,15,35,.98)); border:1px solid rgba(139,92,246,.4); border-radius:28px; padding:2rem; max-width:650px; width:100%; box-shadow:0 40px 100px rgba(0,0,0,.9); animation:slideUp .4s ease; position:relative; }
        .upgrade-header { text-align:center; margin-bottom:2rem; }

// ═══════════════════════════════════════════
function assignTrialCombinations(objective, sound, duration) {
    const freqMap    = { relax:[432,396,528,174], focus:[417,741,432,285], sleep:[396,432,174,285], explore:[852,963,528,639] };
    const groupPrio  = { nature:['nature_essence','deep_contemplation','minimal_focus'], cosmic:['cosmic_dimensions','deep_contemplation','sacred_traditions'], minimal:['minimal_focus','deep_contemplation','nature_essence'], sacred:['sacred_traditions','deep_contemplation','cosmic_dimensions'] };
    const tagMap     = { relax:['relax'], focus:['focus'], sleep:['sleep','relax'], explore:['explore','relax'] };

    const freqs    = freqMap[objective]   || [432,528,396];
    const groups   = [...(groupPrio[sound] || Object.keys(TRACK_GROUPS)), ...Object.keys(TRACK_GROUPS).filter(g=>!(groupPrio[sound]||[]).includes(g))];
    const tags     = tagMap[objective]    || ['relax'];
    const maxPerGroup = duration === 'long' ? 2 : 1;
    const result   = [];

    for (const group of groups) {
        if (result.length >= 12) break;
        const pool = TRACK_GROUPS[group].tracks.filter(t => t.tags.some(x=>tags.includes(x)));
        const src  = pool.length ? pool : TRACK_GROUPS[group].tracks;
        for (let i = 0; i < Math.min(maxPerGroup, src.length) && result.length < 12; i++) {
            result.push({ group, trackId: src[i].id, freq: freqs[result.length % freqs.length] });
        }
    }
    while (result.length < 10) {
        const g = groups[result.length % groups.length];
        const t = TRACK_GROUPS[g].tracks[0];
        const f = freqs[result.length % freqs.length];
        if (!result.find(r=>r.group===g&&r.trackId===t.id&&r.freq===f)) result.push({group:g,trackId:t.id,freq:f});
        else break;
    }
    return result;
}

    apiKey: "AIzaSyB9xmneVbtdA_W7Nno6hcDA_nBLfS4ns-w",
    authDomain: "purefrequenze-35ff7.firebaseapp.com",
    projectId: "purefrequenze-35ff7",
    storageBucket: "purefrequenze-35ff7.firebasestorage.app",
    messagingSenderId: "895586868188",
    appId: "1:895586868188:web:5929cb5b482ab3bc93cd19"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
const functions = firebase.functions();

// ═══════════════════════════════════════════
// PERSISTENZA LOCALE
// ═══════════════════════════════════════════
function loadLocal() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || null; } catch(e){ return null; }
}
function saveLocal(data) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e){}
}

// ═══════════════════════════════════════════
// APP
// ═══════════════════════════════════════════
const App = () => {
    // ── accesso
    const [accessMode, setAccessMode]     = useState('loading'); // loading|onboarding|free|trial|expired|premium
    const [trialData, setTrialData]       = useState(null);      // {start, end, combinations}
    const [isPremium, setIsPremium]       = useState(false);
    const [premiumSuccess, setPremiumSuccess] = useState(false);

    // ── onboarding
    const [onbStep, setOnbStep]           = useState(0);
    const [onbAnswers, setOnbAnswers]     = useState({});

    // ── player state
    const [selectedFreq, setSelectedFreq] = useState(432);
    const [selectedGroup, setSelectedGroup]= useState('deep_contemplation');
    const [selectedTrack, setSelectedTrack]= useState(0);
    const [isPlaying, setIsPlaying]       = useState(false);
    const [currentTime, setCurrentTime]   = useState(0);
    const [duration, setDuration]         = useState(300);
    const [volume, setVolume]             = useState(0.7);
    const [activeTab, setActiveTab]       = useState('tracks');
    const [binauralMode, setBinauralMode] = useState(null);
    const [binauralRange, setBinauralRange]= useState('theta');
    const [isShuffle, setIsShuffle]       = useState(false);
    const [isRepeat, setIsRepeat]         = useState(false);
    const [showTimerModal, setShowTimerModal]= useState(false);
    const [showUpgradeModal, setShowUpgradeModal]= useState(false);
    const [sleepTimer, setSleepTimer]     = useState(null);

    const audioRef    = useRef(null);
    const audioCtxRef = useRef(null);
    const oscLRef     = useRef(null);
    const oscRRef     = useRef(null);
    const gainRef     = useRef(null);
    const timerRef    = useRef(null);

    // ──────────────────────────────────────
    // INIT: carica stato salvato
    // ──────────────────────────────────────
    useEffect(() => {
        const saved = loadLocal();
        if (!saved) { setAccessMode('onboarding'); return; }

        if (saved.isPremium) { setAccessMode('premium'); setIsPremium(true); return; }

        if (saved.trial) {
            const now = Date.now();
            if (now < saved.trial.end) {
                setTrialData(saved.trial);
                setAccessMode('trial');
                // default su prima combo
                if (saved.trial.combinations?.length) {
                    setSelectedFreq(saved.trial.combinations[0].freq);
                    setSelectedGroup(saved.trial.combinations[0].group);
                }
            } else {
                setAccessMode('expired');
            }
        } else {
            setAccessMode('free');
        }
    }, []);

    useEffect(() => { const p = new URLSearchParams(window.location.search); if (p.get("premium") === "success") { setPremiumSuccess(true); window.history.replaceState({}, "", window.location.pathname); } }, []);

    // Check Firebase premium
    useEffect(() => {
        const unsub = auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const doc = await db.collection('users').doc(user.uid).get();
                    if (doc.exists && doc.data().isPremium) {
                        setIsPremium(true);
                        setAccessMode('premium');
                        saveLocal({ isPremium: true });
                    }
                } catch(e){}
            }
        });
        return ()=>unsub();
    }, []);

    // Check scadenza trial ogni minuto
    useEffect(() => {
        if (accessMode !== 'trial') return;
        const check = () => {
            if (trialData && Date.now() >= trialData.end) {
                setAccessMode('expired');
                saveLocal({ trial: trialData, expired: true });
            }
        };
        const id = setInterval(check, 60000);
        return ()=>clearInterval(id);
    }, [accessMode, trialData]);

    // ──────────────────────────────────────
    // LOGICA ACCESSO
    // ──────────────────────────────────────
    const canAccess = (group, freq) => {
        if (isPremium || accessMode === 'premium') return true;
        if (group === FREE_GROUP && freq === FREE_FREQ) return true;
        if (accessMode === 'trial' && trialData) {
            return trialData.combinations.some(c => c.group === group && c.freq === freq);
        }
        return false;
    };

    const canAccessFreq = (freq) => {
        if (isPremium || accessMode === 'premium') return true;
        if (freq === FREE_FREQ) return true;
        if (accessMode === 'trial' && trialData) return trialData.combinations.some(c => c.freq === freq);
        return false;
    };

    const canAccessGroup = (group) => {
        if (isPremium || accessMode === 'premium') return true;
        if (group === FREE_GROUP && selectedFreq === FREE_FREQ) return true;
        if (accessMode === 'trial' && trialData) return trialData.combinations.some(c => c.group === group);
        return false;
    };

    // ──────────────────────────────────────
    // ONBOARDING
    // ──────────────────────────────────────
    const ONB_QUESTIONS = [
        { label:"01 / 03", question:"Qual è il tuo obiettivo principale?", key:"objective", options:[{v:"relax",l:"Rilassamento profondo"},{v:"focus",l:"Concentrazione e focus"},{v:"sleep",l:"Migliorare il sonno"},{v:"explore",l:"Esplorazione mentale"}] },
        { label:"02 / 03", question:"Che tipo di suoni preferisci?",        key:"sound",     options:[{v:"nature",l:"Naturali — acqua, vento, foresta"},{v:"cosmic",l:"Spaziali — atmosfere eteree e cosmiche"},{v:"minimal",l:"Minimali — toni puri ed essenziali"},{v:"sacred",l:"Tradizionali — rituali e sacri"}] },
        { label:"03 / 03", question:"Quanto tempo hai di solito?",           key:"duration",  options:[{v:"short",l:"10–15 minuti"},{v:"medium",l:"20–30 minuti"},{v:"long",l:"Sessioni lunghe — 45 min o più"}] }
    ];

    const handleOnbSelect = (key, val) => setOnbAnswers(prev=>({...prev,[key]:val}));

    const handleOnbNext = () => {
        if (onbStep < 2) { setOnbStep(s=>s+1); return; }
        // Finisci onboarding
        const { objective, sound, duration } = onbAnswers;
        const combos = assignTrialCombinations(objective, sound, duration);
        const trial  = { start: Date.now(), end: Date.now() + TRIAL_DAYS*86400000, combinations: combos };
        setTrialData(trial);
        setAccessMode('trial');
        setSelectedFreq(combos[0].freq);
        setSelectedGroup(combos[0].group);
        saveLocal({ trial });
    };

    // ──────────────────────────────────────
    // TRIAL UI helpers
    // ──────────────────────────────────────
    const getDaysLeft = () => {
        if (!trialData) return 0;
        return Math.max(0, Math.ceil((trialData.end - Date.now()) / 86400000));
    };
    const getTrialProgress = () => {
        if (!trialData) return 1;
        return Math.min(1, (Date.now() - trialData.start) / (trialData.end - trialData.start));
    };

    // ──────────────────────────────────────
    // AUDIO
    // ──────────────────────────────────────
    const getAudioUrl = () =>
        `${WORKER_URL}/${selectedGroup}/${TRACK_GROUPS[selectedGroup].tracks[selectedTrack].id}_${selectedFreq}Hz.mp3`;

    useEffect(() => {
        if (audioRef.current && binauralMode !== 'pure') {
            audioRef.current.src = getAudioUrl();
            audioRef.current.load();
        }
    }, [selectedFreq, selectedGroup, selectedTrack]);

    const startBinaural = () => {
        if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext||window.webkitAudioContext)();
        stopBinaural();
        const ctx = audioCtxRef.current;
        if (ctx.state==='suspended') ctx.resume();
        const r = BINAURAL_RANGES[binauralRange];
        oscLRef.current = ctx.createOscillator();
        oscRRef.current = ctx.createOscillator();
        gainRef.current = ctx.createGain();
        gainRef.current.gain.value = volume * 0.3;
        const pL = ctx.createStereoPanner(); pL.pan.value = -1;
        const pR = ctx.createStereoPanner(); pR.pan.value = 1;
        oscLRef.current.frequency.value = r.carrier;
        oscRRef.current.frequency.value = r.carrier + r.freq;
        oscLRef.current.type = oscRRef.current.type = 'sine';
        oscLRef.current.connect(pL).connect(gainRef.current).connect(ctx.destination);
        oscRRef.current.connect(pR).connect(gainRef.current).connect(ctx.destination);
        oscLRef.current.start(); oscRRef.current.start();
    };
    const stopBinaural = () => {
        [oscLRef, oscRRef].forEach(r=>{ try{ r.current?.stop(); r.current?.disconnect(); r.current=null; }catch(e){ r.current=null; } });
        try{ gainRef.current?.disconnect(); gainRef.current=null; }catch(e){}
    };

    useEffect(()=>{
        if (isPlaying) {
            if (binauralMode) startBinaural();
            if (binauralMode !== 'pure' && audioRef.current) audioRef.current.play().catch(()=>setIsPlaying(false));
        } else {
            stopBinaural();
            audioRef.current?.pause();
        }
    },[isPlaying, binauralMode, binauralRange]);

    useEffect(()=>{ if(audioRef.current) audioRef.current.volume=volume; if(gainRef.current) gainRef.current.gain.value=volume*.3; },[volume]);

    useEffect(()=>{
        const a=audioRef.current; if(!a) return;
        const t=()=>setCurrentTime(a.currentTime);
        // Fix VBR: seek-to-end trick per forzare il browser a leggere la durata reale
        const d=()=>{
            const dur = a.duration;
            if(!dur || !isFinite(dur) || dur < 1) return;
            // Se la durata sembra sbagliata (< 360s per tracce da 10min), usa seek trick
            if(dur < 360) {
                const savedTime = a.currentTime;
                const onSeeked = ()=>{
                    const realDur = a.duration;
                    if(realDur && isFinite(realDur) && realDur > 1) setDuration(realDur);
                    a.currentTime = savedTime;
                    a.removeEventListener('seeked', onSeeked);
                };
                a.addEventListener('seeked', onSeeked);
                a.currentTime = 1e10; // seek alla fine
            } else {
                setDuration(dur);
            }
        };
        const e=()=>{ if(isRepeat){a.currentTime=0;a.play();}else handleNext(); };
        a.addEventListener('timeupdate',t);
        a.addEventListener('loadedmetadata',d);
        a.addEventListener('durationchange',d);
        a.addEventListener('ended',e);
        return()=>{
            a.removeEventListener('timeupdate',t);
            a.removeEventListener('loadedmetadata',d);
            a.removeEventListener('durationchange',d);
            a.removeEventListener('ended',e);
        };
    },[isRepeat]);

    useEffect(()=>{ if(sleepTimer){ timerRef.current=setTimeout(()=>{setIsPlaying(false);setSleepTimer(null);},sleepTimer*60000); } return()=>{ if(timerRef.current) clearTimeout(timerRef.current); }; },[sleepTimer]);
    useEffect(()=>{ if(showUpgradeModal||showTimerModal) document.body.classList.add('modal-open'); else document.body.classList.remove('modal-open'); return()=>document.body.classList.remove('modal-open'); },[showUpgradeModal,showTimerModal]);

    const formatTime = s => isNaN(s)?'0:00':`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
    const handleProgressClick = e=>{ const r=e.currentTarget.getBoundingClientRect(); const p=(e.clientX-r.left)/r.width; if(audioRef.current&&binauralMode!=='pure') audioRef.current.currentTime=p*duration; };
    const handleProgressTouch = e=>{ const t=e.touches[0]||e.changedTouches[0]; const r=e.currentTarget.getBoundingClientRect(); const p=Math.max(0,Math.min(1,(t.clientX-r.left)/r.width)); if(audioRef.current&&binauralMode!=='pure') audioRef.current.currentTime=p*duration; };

    const handleNext = () => {
        const wasPlaying = isPlaying;
        setIsPlaying(false);
        const tracks = TRACK_GROUPS[selectedGroup].tracks;
        if (isShuffle) {
            const g = Object.keys(TRACK_GROUPS); const rg = g[Math.floor(Math.random()*g.length)];
            setSelectedGroup(rg); setSelectedTrack(Math.floor(Math.random()*TRACK_GROUPS[rg].tracks.length));
        } else {
            let next = (selectedTrack+1)%tracks.length;
            if (next===0) { const gs=Object.keys(TRACK_GROUPS); setSelectedGroup(gs[(gs.indexOf(selectedGroup)+1)%gs.length]); }
            setSelectedTrack(next);
        }
        if (wasPlaying) setTimeout(()=>setIsPlaying(true), 150);
    };
    const handlePrev = () => {
        const wasPlaying = isPlaying;
        setIsPlaying(false);
        if (selectedTrack>0) { setSelectedTrack(s=>s-1); }
        else { const gs=Object.keys(TRACK_GROUPS); const prev=gs[(gs.indexOf(selectedGroup)-1+gs.length)%gs.length]; setSelectedGroup(prev); setSelectedTrack(TRACK_GROUPS[prev].tracks.length-1); }
        if (wasPlaying) setTimeout(()=>setIsPlaying(true), 150);
    };

    const handleFreqSelect = freq => {
        if (!canAccessFreq(freq)) { setShowUpgradeModal(true); return; }
        setSelectedFreq(freq); setBinauralMode(null); setIsPlaying(false); setTimeout(()=>setIsPlaying(true),100);
    };
    const handleTrackSelect = (group, idx) => {
        const track = TRACK_GROUPS[group].tracks[idx];
        if (!canAccess(group, selectedFreq)) { setShowUpgradeModal(true); return; }
        setSelectedGroup(group); setSelectedTrack(idx); setBinauralMode(null); setIsPlaying(false); setTimeout(()=>setIsPlaying(true),100);
    };
    const handleBinauralSelect = mode => { setIsPlaying(false); stopBinaural(); audioRef.current?.pause(); setBinauralMode(mode); setTimeout(()=>setIsPlaying(true),150); };

    const handleUpgrade = async (plan) => {
        try {
            if (!auth.currentUser) await auth.signInAnonymously();
            const fn = firebase.app().functions('us-central1').httpsCallable('createCheckoutSession');
            const res = await fn({ plan });
            if (res.data?.url) window.location.href = res.data.url;
        } catch(e){ console.error(e); alert('Errore checkout: '+e.message); }
    };

    const currentFreqData  = FREQUENCIES[selectedFreq];
    const currentTrackData = TRACK_GROUPS[selectedGroup].tracks[selectedTrack];
    const daysLeft = getDaysLeft();
    const trialProgress = getTrialProgress();

    // ──────────────────────────────────────
    // LOADING
    // ──────────────────────────────────────
    if (accessMode === 'loading') return null;

    // ──────────────────────────────────────
    // ONBOARDING
    // ──────────────────────────────────────
    if (accessMode === 'onboarding') {
        const q = ONB_QUESTIONS[onbStep];
        return (
            <div className="onboarding-overlay">
                <div className="onboarding-box">
                    <div className="onb-logo">Purefrequenze</div>
                    <p className="onb-subtitle">Tre domande rapide per personalizzare la tua esperienza</p>

                    <div className="onb-progress">
                        {[0,1,2].map(i=>(
                            <div key={i} className={`onb-dot ${i<onbStep?'done':i===onbStep?'active':''}`}/>
                        ))}
                    </div>

                    <div className="onb-label">{q.label}</div>
                    <div className="onb-question">{q.question}</div>
                    <div className="onb-options">
                        {q.options.map(opt=>(
                            <button key={opt.v} className={`onb-option ${onbAnswers[q.key]===opt.v?'selected':''}`} onClick={()=>handleOnbSelect(q.key, opt.v)}>
                                {opt.l}
                            </button>
                        ))}
                    </div>
                    <div className="onb-nav">
                        {onbStep > 0
                            ? <button className="onb-back" onClick={()=>setOnbStep(s=>s-1)}>← Indietro</button>
                            : <span/>
                        }
                        <button className="onb-next" disabled={!onbAnswers[q.key]} onClick={handleOnbNext}>
                            {onbStep < 2 ? 'Avanti →' : 'Inizia il Trial →'}
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    // ──────────────────────────────────────
    // EXPIRED
    // ──────────────────────────────────────
    const ExpiredOverlay = () => (
        <div className="expired-overlay">
            <div className="expired-box">
                <div className="expired-icon">⏱</div>
                <div className="expired-title">Il trial è terminato</div>
                <p className="expired-text">Hai esplorato per 7 giorni tutte le combinazioni personalizzate.<br/>Continua con Premium per accesso illimitato a tutte le 43 tracce e 10 frequenze.</p>
                <button className="expired-cta" onClick={()=>setShowUpgradeModal(true)}>SCOPRI I PIANI PREMIUM</button>
                <button className="expired-free" onClick={()=>{ setAccessMode('free'); setSelectedFreq(FREE_FREQ); setSelectedGroup(FREE_GROUP); }}>
                    Continua con le tracce gratuite
                </button>
            </div>
        </div>
    );

    // ──────────────────────────────────────
    // RENDER PRINCIPALE
    // ──────────────────────────────────────
    return (
        <>
        <audio ref={audioRef} preload="auto"/>

        {accessMode === 'expired' && !showUpgradeModal && <ExpiredOverlay/>}

        <div className="app-container">
{premiumSuccess && <div style={{background:"rgba(74,222,128,0.1)",border:"1px solid rgba(74,222,128,0.3)",borderRadius:"14px",padding:"12px 20px",marginBottom:"1.5rem",display:"flex",alignItems:"center",gap:"12px"}}><span>🎉</span><span style={{flex:1,color:"rgba(255,255,255,.85)"}}>Benvenuto in <strong style={{color:"#4ade80"}}>Premium</strong>! Tutte le frequenze sono sbloccate.</span><span style={{cursor:"pointer",color:"rgba(255,255,255,.4)"}} onClick={()=>setPremiumSuccess(false)}>×</span></div>}
            <div className="header">
                <h1 className="logo">PUREFREQUENZE</h1>
                <p className="tagline">Trasforma la tua energia con frequenze Solfeggio scientificamente calibrate</p>
            </div>

            {/* ── TRIAL BANNER ── */}
            {accessMode === 'trial' && trialData && (
                <div className={`trial-banner ${daysLeft<=2?'warning':''}`}>
                    <div className={`trial-dot ${daysLeft<=2?'warn':''}`}/>
                    <div className={`trial-text ${daysLeft<=2?'warn':''}`}>
                        Trial attivo · <strong>{daysLeft} {daysLeft===1?'giorno':'giorni'} rimanenti</strong> · {trialData.combinations.length} combinazioni personalizzate
                    </div>
                    <div className="trial-bar-wrap">
                        <div className={`trial-bar-fill ${daysLeft<=2?'warn':''}`} style={{width:`${Math.round(trialProgress*100)}%`}}/>
                    </div>
                    <span className="trial-upgrade" onClick={()=>setShowUpgradeModal(true)}>Sblocca tutto →</span>
                </div>
            )}

            {/* ── FREE BANNER ── */}
            {(accessMode === 'free' || accessMode === 'expired') && (
                <div style={{background:'rgba(139,92,246,.1)',border:'1px solid rgba(139,92,246,.25)',borderRadius:'14px',padding:'12px 20px',marginBottom:'1.5rem',display:'flex',alignItems:'center',gap:'16px',fontSize:'.85rem'}}>
                    <span style={{color:'rgba(255,255,255,.6)'}}>Stai usando la versione gratuita · <strong style={{color:'#c084fc'}}>432 Hz × Deep Contemplation</strong></span>
                    <span style={{marginLeft:'auto',color:'#c084fc',cursor:'pointer',textDecoration:'underline',textUnderlineOffset:'3px',fontSize:'.8rem'}} onClick={()=>setShowUpgradeModal(true)}>Sblocca tutto →</span>
                </div>
            )}

            <div className="main-layout">
                {/* ── PLAYER ── */}
                <div className="player-column">
                    <div className="player-card">
                        <div className="cover-art" style={{background:binauralMode==='pure'?'linear-gradient(135deg,#7c3aed,#6366f1)':`linear-gradient(135deg,${currentFreqData.color},#8b5cf6)`}}>
                            <svg viewBox="0 0 24 24"><path d={binauralMode==='pure'?"M2 12h4l3-9 4 18 3-9h4":TRACK_GROUPS[selectedGroup].icon}/></svg>
                        </div>
                        <div className="track-info">
                            <div className="freq-badge" style={{background:binauralMode==='pure'?'#7c3aed':currentFreqData.color}}>
                                {binauralMode==='pure'?`${BINAURAL_RANGES[binauralRange].freq} Hz`:`${currentFreqData.hz} Hz`}
                            </div>
                            <h2 className="track-name">{binauralMode==='pure'?`Binaurale — ${BINAURAL_RANGES[binauralRange].name.split('(')[0]}`:TRACK_GROUPS[selectedGroup].name}</h2>
                            <p className="track-subtitle">{binauralMode==='pure'?BINAURAL_RANGES[binauralRange].desc:currentTrackData.name}</p>
                            {binauralMode && <div className="mode-badge">{binauralMode==='pure'?'Modalità Binaurale Pura':'Modalità Ibrida'}</div>}
                        </div>
                        <div className="progress-container">
                            <div className="progress-bar" onClick={handleProgressClick} onTouchMove={handleProgressTouch} onTouchEnd={handleProgressTouch}>
                                <div className="progress-fill" style={{width:binauralMode==='pure'?'50%':`${(currentTime/duration)*100}%`,background:binauralMode==='pure'?'linear-gradient(90deg,#7c3aed,#6366f1)':`linear-gradient(90deg,${currentFreqData.color},#8b5cf6)`}}/>
                            </div>
                            <div className="time-info"><span>{binauralMode==='pure'?'∞':formatTime(currentTime)}</span><span>{binauralMode==='pure'?'Continuo':formatTime(duration)}</span></div>
                        </div>
                        <div className="player-controls">
                            <button className="control-btn" onClick={handlePrev}><SkipBIcon/></button>
                            <button className="control-btn play" onClick={()=>setIsPlaying(!isPlaying)}>{isPlaying?<PauseIcon/>:<PlayIcon/>}</button>
                            <button className="control-btn" onClick={handleNext}><SkipFIcon/></button>
                        </div>
                        <div className="secondary-controls">
                            <button className={`control-btn ${isShuffle?'active':''}`} onClick={()=>setIsShuffle(!isShuffle)}><ShuffleIcon/></button>
                            <button className={`control-btn ${isRepeat?'active':''}`} onClick={()=>setIsRepeat(!isRepeat)}><RepeatIcon/></button>
                            <button className={`control-btn ${sleepTimer?'active':''}`} onClick={()=>setShowTimerModal(true)}><ClockIcon/></button>
                            <div className="volume-control">
                                <button className="control-btn"><VolumeIcon/></button>
                                <input type="range" className="volume-slider" min="0" max="1" step="0.01" value={volume} onChange={e=>setVolume(parseFloat(e.target.value))}/>
                            </div>
                        </div>
                    </div>
                </div>

                {/* ── TABS ── */}
                <div className="tabs-column">
                    <div className="tabs-header">
                        <button className={`tab-button ${activeTab==='tracks'?'active':''}`} onClick={()=>setActiveTab('tracks')}>Tracce & Frequenze</button>
                        <button className={`tab-button ${activeTab==='applications'?'active':''}`} onClick={()=>setActiveTab('applications')}>Applicazioni</button>
                        <button className={`tab-button ${activeTab==='binaural'?'active':''}`} onClick={()=>setActiveTab('binaural')}>Battimenti Binaurali</button>
                    </div>
                    <div className="tab-content">

                        {/* TAB TRACCE */}
                        {activeTab==='tracks' && (<>
                            <h3 style={{fontSize:'1.6rem',marginBottom:'1.5rem'}}>Seleziona Frequenza:</h3>
                            <div className="freq-grid">
                                {Object.entries(FREQUENCIES).map(([freq,data])=>{
                                    const acc = canAccessFreq(parseInt(freq));
                                    return (
                                        <div key={freq} className={`freq-item ${selectedFreq==freq&&!binauralMode?'active':''} ${!acc?'locked':''}`}
                                            style={{'--freq-color':data.color,'--freq-rgb':data.rgb}}
                                            onClick={()=>handleFreqSelect(parseInt(freq))}>
                                            {!acc && <div className="premium-badge"><LockIcon/></div>}
                                            <h3>{data.hz} Hz</h3>
                                            <p className="description">{data.desc}</p>
                                        </div>
                                    );
                                })}
                            </div>

                            <h3 style={{fontSize:'1.6rem',margin:'3rem 0 1.5rem'}}>Seleziona Traccia:</h3>
                            <div className="track-groups">
                                {Object.entries(TRACK_GROUPS).map(([groupId,group])=>{
                                    const groupAcc = canAccessGroup(groupId);
                                    return (
                                        <div key={groupId} className="track-group">
                                            <div className="track-group-header">
                                                <svg className="track-group-icon" viewBox="0 0 24 24"><path d={group.icon}/></svg>
                                                <h3>{group.name} {!groupAcc && <span style={{fontSize:'.7rem',color:'rgba(255,255,255,.3)',fontWeight:400}}>🔒</span>}</h3>
                                            </div>
                                            <div className="track-list">
                                                {group.tracks.map((track,idx)=>{
                                                    const acc = canAccess(groupId, selectedFreq);
                                                    // badge
                                                    let badge = null;
                                                    if (groupId===FREE_GROUP && selectedFreq===FREE_FREQ) badge=<span className="access-badge badge-free">FREE</span>;
                                                    else if (acc && accessMode==='trial') badge=<span className="access-badge badge-trial">TRIAL</span>;
                                                    else if (!acc) badge=<span className="access-badge badge-lock">🔒 PREMIUM</span>;
                                                    return (
                                                        <div key={track.id} className={`track-item ${selectedGroup===groupId&&selectedTrack===idx&&!binauralMode?'active':''} ${!acc?'locked-item':''}`}
                                                            onClick={()=>handleTrackSelect(groupId,idx)}>
                                                            <div><h4>{track.name}{badge}</h4><p>{track.subtitle}</p></div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </>)}

                        {/* TAB APPLICAZIONI */}
                        {activeTab==='applications' && (
                            <div className="applications-grid">
                                {Object.entries(APPLICATIONS).map(([key,app])=>(
                                    <div key={key} className="application-card">
                                        <div className="app-header">
                                            <svg className="app-icon" viewBox="0 0 24 24"><path d={app.icon}/></svg>
                                            <div><h3>{app.title}</h3><p className="app-subtitle">{app.desc}</p></div>
                                        </div>
                                        <div className="objectives-list">
                                            {app.objectives.map((obj,i)=>(
                                                <div key={i} className="objective-item">
                                                    <div style={{flex:1}}>
                                                        <h4 style={{marginBottom:'.5rem'}}>{obj.name}</h4>
                                                        <div className="objective-freqs">
                                                            {obj.freqs.map(f=>(
                                                                <span key={f} className="freq-tag" onClick={()=>handleFreqSelect(f)}>{f} Hz</span>
                                                            ))}
                                                            {obj.binaural?.map(b=>(
                                                                <span key={b} className="freq-tag" style={{background:'rgba(124,58,237,.15)',borderColor:'rgba(124,58,237,.4)',color:'#c4b5fd'}}
                                                                    onClick={()=>{setBinauralRange(b);handleBinauralSelect('hybrid');}}>
                                                                    {BINAURAL_RANGES[b].name.split(' ')[0]}
                                                                </span>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* TAB BINAURAL */}
                        {activeTab==='binaural' && (<>
                            <h2 style={{fontSize:'2rem',marginBottom:'1rem'}}>Battimenti Binaurali</h2>
                            <p style={{color:'rgba(255,255,255,.7)',marginBottom:'2rem',lineHeight:'1.7'}}>
                                I battimenti binaurali sono illusioni uditive create dal cervello quando ascolti due toni con frequenze leggermente diverse. La ricerca scientifica mostra risultati contrastanti, ma molti utenti riportano benefici per rilassamento e focus.
                            </p>
                            <div className="binaural-modes">
                                <div className={`binaural-card ${binauralMode==='pure'?'active':''}`} onClick={()=>handleBinauralSelect('pure')}>
                                    <h3>Modalità Pura</h3>
                                    <p>Solo battimenti binaurali generati in tempo reale con Web Audio API.</p>
                                    <ul className="binaural-features"><li>Generazione real-time precisa</li><li>Frequenze carrier ottimizzate</li><li>Esperienza minimale e diretta</li></ul>
                                </div>
                                <div className={`binaural-card ${binauralMode==='hybrid'?'active':''}`} onClick={()=>handleBinauralSelect('hybrid')}>
                                    <h3>Modalità Ibrida</h3>
                                    <p>Battimenti binaurali + Frequenze Solfeggio simultanee.</p>
                                    <ul className="binaural-features"><li>Solfeggio + Binaurale combinati</li><li>Musica ambient mascherante</li><li>Esperienza completa e immersiva</li></ul>
                                </div>
                            </div>
                            {binauralMode && (
                                <div style={{marginTop:'2rem'}}>
                                    <h3 style={{fontSize:'1.4rem',marginBottom:'1rem'}}>Seleziona Frequenza Binaurale:</h3>
                                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:'1rem'}}>
                                        {Object.entries(BINAURAL_RANGES).map(([k,r])=>(
                                            <button key={k} className="freq-tag" style={{padding:'1rem',fontSize:'.95rem',background:binauralRange===k?'rgba(139,92,246,.3)':'rgba(139,92,246,.1)',borderColor:binauralRange===k?'#8b5cf6':'rgba(139,92,246,.3)'}}
                                                onClick={()=>{setBinauralRange(k);if(isPlaying&&binauralMode){stopBinaural();setTimeout(startBinaural,150);}}}>
                                                <div style={{fontWeight:700,marginBottom:'.4rem'}}>{r.name.split('(')[0]}</div>
                                                <div style={{fontSize:'.85rem',opacity:.8}}>{r.desc}</div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}
                            <div className="warning-box"><WarningIcon/><p><strong>Importante:</strong> I battimenti binaurali funzionano SOLO con cuffie stereo.</p></div>
                        </>)}
                    </div>
                </div>
            </div>

            {/* FOOTER NOTE */}
            <div style={{marginTop:'3rem',padding:'1.5rem 2rem',background:'linear-gradient(135deg,rgba(139,92,246,.15),rgba(99,102,241,.1))',border:'1px solid rgba(139,92,246,.3)',borderRadius:'16px',textAlign:'center'}}>
                <h4 style={{color:'#c084fc',fontSize:'1rem',marginBottom:'.8rem',fontWeight:600}}>Transizione tra Frequenze</h4>
                <p style={{color:'rgba(255,255,255,.7)',fontSize:'.9rem',lineHeight:'1.6',maxWidth:'800px',margin:'0 auto'}}>Al cambio di frequenza potresti percepire una leggera variazione tonale nei primi secondi. Questo è del tutto normale: il tuo orecchio si sta adattando alla nuova frequenza.</p>
            </div>
            <div style={{marginTop:'2rem',marginBottom:'2rem',padding:'2rem',background:'linear-gradient(135deg,rgba(30,20,60,.5),rgba(20,15,45,.4))',backdropFilter:'blur(30px)',border:'1px solid rgba(59,130,246,.2)',borderRadius:'20px',textAlign:'center'}}>
                <h4 style={{color:'#60a5fa',fontSize:'1.1rem',marginBottom:'1rem'}}>ℹ️ Nota Scientifica</h4>
                <p style={{color:'rgba(255,255,255,.7)',fontSize:'.95rem',lineHeight:'1.7',maxWidth:'900px',margin:'0 auto'}}>Le frequenze Solfeggio si basano su tradizioni storiche e ricerca preliminare. I battimenti binaurali mostrano evidenze scientifiche contrastanti. Gli effetti possono variare individualmente e queste tecniche non sostituiscono trattamenti medici professionali.</p>
            </div>
        </div>

        {/* ── UPGRADE MODAL ── */}
        {showUpgradeModal && (
            <div className="modal-overlay" onClick={()=>setShowUpgradeModal(false)}>
                <div className="upgrade-modal" onClick={e=>e.stopPropagation()}>
                    <button className="modal-close" onClick={()=>setShowUpgradeModal(false)}>×</button>
                    <div className="upgrade-header">
                        <div style={{fontSize:'.85rem',textTransform:'uppercase',letterSpacing:'2px',color:'#8b5cf6',fontWeight:600,marginBottom:'1rem'}}>PureFrequenze Premium</div>
                        <h2>Accesso Completo</h2>
                        <p>Accedi all'intera libreria di 43 tracce × 10 frequenze</p>
                    </div>
                    <div className="upgrade-features">
                        {[
                            ['430 Combinazioni Audio','43 tracce × 10 frequenze Solfeggio — accesso completo'],
                            ['Tutti i Gruppi','Deep Contemplation, Cosmic, Sacred Traditions, Emotional Landscapes, e altri'],
                            ['Battimenti Binaurali Completi','Delta, Theta, Alpha, Beta, Gamma + modalità ibrida'],
                            ['Timer & Download Offline','Tutte le opzioni timer + ascolto senza connessione'],
                        ].map(([t,d],i)=>(
                            <div key={i} className="upgrade-feature">
                                <CheckIcon/><div><h4>{t}</h4><p>{d}</p></div>
                            </div>
                        ))}
                    </div>
                    <div className="upgrade-pricing">
                        <div className="pricing-option" onClick={()=>handleUpgrade('monthly')}>
                            <h4>Mensile</h4><div className="price">€5<span>/mese</span></div>
                        </div>
                        <div className="pricing-option" onClick={()=>handleUpgrade('annual')}>
                            <h4>Annuale</h4><div className="price">€42<span>/anno</span></div><div className="savings">Risparmi 30%</div>
                        </div>

                    </div>
                    <button className="upgrade-cta" onClick={()=>handleUpgrade('annual')}>Attiva Premium</button>
                    <p style={{textAlign:'center',marginTop:'1.5rem',color:'rgba(255,255,255,.5)',fontSize:'.85rem'}}>Pagamento sicuro via Stripe · Cancella quando vuoi · Garanzia 30 giorni</p>
                </div>
            </div>
        )}

        {/* ── TIMER MODAL ── */}
        {showTimerModal && (
            <div className="modal-overlay" onClick={()=>setShowTimerModal(false)}>
                <div className="timer-modal" onClick={e=>e.stopPropagation()}>
                    <button className="modal-close" onClick={()=>setShowTimerModal(false)}>×</button>
                    <h3 style={{marginBottom:'.5rem',fontSize:'1.4rem'}}>Sleep Timer</h3>
                    <p style={{color:'rgba(255,255,255,.6)',fontSize:'.95rem',marginBottom:'1rem'}}>L'audio si fermerà automaticamente</p>
                    <div className="timer-options">
                        {[15,30,45,60,90].map(m=>(
                            <button key={m} className={`timer-option ${sleepTimer===m?'active':''}`} onClick={()=>{setSleepTimer(m);setShowTimerModal(false);}}>{m} min</button>
                        ))}
                        <button className="timer-option" onClick={()=>{setSleepTimer(null);if(timerRef.current)clearTimeout(timerRef.current);setShowTimerModal(false);}}>Off</button>
                    </div>
                    {sleepTimer && <p style={{marginTop:'1rem',color:'#8b5cf6',textAlign:'center',fontSize:'.95rem'}}>Attivo: {sleepTimer} minuti</p>}
                </div>
            </div>
        )}
        </>
    );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
