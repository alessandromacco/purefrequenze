/* ─── APP ─── */
const App = () => {
  const [isPremium,    setIsPremium]    = useState(false);
  const [userId,       setUserId]       = useState(null);
  const [isTrial,      setIsTrial]      = useState(false);
  const [trialDaysLeft,setTrialDaysLeft]= useState(0);

  /* Auth + premium check all'avvio */
  useEffect(() => {
    const initAuth = async () => {
      if (!auth) return;
      auth.onAuthStateChanged(async (user) => {
        let uid = user?.uid;
        if (!uid) {
          const newUser = await signInAnon();
          uid = newUser?.uid;
        }
        if (uid) {
          setUserId(uid);
          const status = await checkPremiumStatus(uid);
          setIsPremium(status.isPremium || status.isTrial);
          setIsTrial(status.isTrial);
          setTrialDaysLeft(status.trialDaysLeft);
        }
      });
    };
    initAuth();
  }, []);
  const [activeTrack,  setActiveTrack]  = useState(1);   // Piano e pioggia — morbido default
  const [activeHz,     setActiveHz]     = useState(432);  // Armonia — universale
  const [isPlaying,    setIsPlaying]    = useState(false);
  const [currentTime,  setCurrentTime]  = useState(0);
  const [duration,     setDuration]     = useState(300);   // 5 min default
  const [volume,       setVolume]       = useState(0.72);
  const [isShuffle,    setIsShuffle]    = useState(false);
  const [isRepeat,     setIsRepeat]     = useState(false);
  const [sleepTimer,   setSleepTimer]   = useState(null);
  const [binOn,        setBinOn]        = useState(false);
  const [binRange,     setBinRange]     = useState('alpha'); // Alpha — rilassamento
  const [binMode,      setBinMode]      = useState('hybrid'); // 'pure' | 'hybrid'
  const [activeTab,    setActiveTab]    = useState('obiettivo'); // 'obiettivo' | 'esplora' | 'binaurale'
  const [activeObj,    setActiveObj]    = useState('rilassarsi'); // Pre-selezionato
  const [showUpgrade,  setShowUpgrade]  = useState(false);
  const [showTimer,    setShowTimer]    = useState(false);
  const [selPrice,     setSelPrice]     = useState('annual');

  const audioRef   = useRef(null);
  const ctxRef     = useRef(null);
  const oscLRef    = useRef(null);
  const oscRRef    = useRef(null);
  const gainRef    = useRef(null);
  const timerRef   = useRef(null);
  const solRef     = useRef(null);
  const solGainRef = useRef(null);
  const playGuard  = useRef(false); // previene click rapidi play/pause

  // Refs to prevent stale closures in audio event listeners
  const isRepeatRef  = useRef(isRepeat);
  const isShuffleRef = useRef(isShuffle);
  const isPremiumRef = useRef(isPremium);
  const activeTrackRef = useRef(activeTrack);

  useEffect(() => { isRepeatRef.current  = isRepeat;    }, [isRepeat]);
  useEffect(() => { isShuffleRef.current = isShuffle;   }, [isShuffle]);
  useEffect(() => { isPremiumRef.current = isPremium;   }, [isPremium]);
  useEffect(() => { activeTrackRef.current = activeTrack; }, [activeTrack]);

  const track = TRACKS[activeTrack];
  const hzData = HZ[activeHz];
  const artColor = hzData ? hzData.color : '#18150E';

  useEffect(() => {
    if (!ctxRef.current) ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
  }, []);

  useEffect(() => {
    if (!audioRef.current || binMode === 'pure') return;
    const wasPlaying = isPlaying;
    audioRef.current.src = audioUrl(track.id, activeHz);
    audioRef.current.load();
    setCurrentTime(0);
    if (wasPlaying) {
      audioRef.current.addEventListener('canplay', () => {
        audioRef.current.play().catch(() => {});
      }, { once: true });
    }
  }, [activeTrack, activeHz, binMode]);

  const stopBin = () => {
    [oscLRef, oscRRef].forEach(r => {
      try { r.current?.stop(); r.current?.disconnect(); } catch(e){}
      r.current = null;
    });
    try { gainRef.current?.disconnect(); } catch(e){}
    gainRef.current = null;
  };

  const stopSol = () => {
    try { solRef.current?.stop(); solRef.current?.disconnect(); } catch(e){}
    solRef.current = null;
    try { solGainRef.current?.disconnect(); } catch(e){}
    solGainRef.current = null;
  };

  const startSol = useCallback((hz) => {
    stopSol();
    const ctx = ctxRef.current; if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
    solGainRef.current = ctx.createGain();
    solGainRef.current.gain.value = 0.03;
    solRef.current = ctx.createOscillator();
    solRef.current.type = 'sine';
    solRef.current.frequency.value = hz;
    solRef.current.connect(solGainRef.current).connect(ctx.destination);
    solRef.current.start();
  }, []);

  const startBin = useCallback(() => {
    stopBin();
    const ctx = ctxRef.current; if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
    const r = BINAURAL[binRange];
    gainRef.current = ctx.createGain();
    gainRef.current.gain.value = volume * 0.25;
    oscLRef.current = ctx.createOscillator();
    oscRRef.current = ctx.createOscillator();
    const pL = ctx.createStereoPanner(); pL.pan.value = -1;
    const pR = ctx.createStereoPanner(); pR.pan.value = 1;
    oscLRef.current.frequency.value = r.carrier;
    oscRRef.current.frequency.value = r.carrier + r.beat;
    oscLRef.current.type = oscRRef.current.type = 'sine';
    oscLRef.current.connect(pL).connect(gainRef.current).connect(ctx.destination);
    oscRRef.current.connect(pR).connect(gainRef.current).connect(ctx.destination);
    oscLRef.current.start(); oscRRef.current.start();
  }, [binRange, volume]);

  useEffect(() => {
    if (isPlaying) {
      if (binOn) startBin();
      if (binMode !== 'pure' && audioRef.current) {
        const tryPlay = () => {
          audioRef.current.play().catch(err => {
            if (err.name !== 'AbortError') {
              console.warn('Audio non disponibile:', track?.id);
            }
          });
        };
        // Se audio pronto suonalo subito, altrimenti aspetta canplay
        if (audioRef.current.readyState >= 2) {
          tryPlay();
        } else {
          audioRef.current.addEventListener('canplay', tryPlay, { once: true });
        }
      }
    } else {
      stopBin();
      audioRef.current?.pause();
    }
  }, [isPlaying, binOn, binMode, startBin]);

  useEffect(() => {
    if (audioRef.current) audioRef.current.volume = volume;
    if (gainRef.current) gainRef.current.gain.value = volume * 0.25;
  }, [volume]);


  // Stable ref to nextTrack — always current, no stale closure
  const nextTrackRef = useRef(null);

  useEffect(() => {
    const a = audioRef.current; if (!a) return;
    const onTime = () => setCurrentTime(a.currentTime);
    const onMeta = () => setDuration(isFinite(a.duration) && a.duration > 0 ? a.duration : 300);
    const onEnd  = () => {
      playGuard.current = false; // reset guard dopo fine naturale
      if (isRepeatRef.current) {
        a.currentTime = 0;
        a.play().catch(() => {});
      } else {
        nextTrackRef.current?.();
      }
    };
    a.addEventListener('timeupdate',     onTime);
    a.addEventListener('loadedmetadata', onMeta);
    a.addEventListener('ended',          onEnd);
    return () => {
      a.removeEventListener('timeupdate',     onTime);
      a.removeEventListener('loadedmetadata', onMeta);
      a.removeEventListener('ended',          onEnd);
    };
  }, []); // mount only — handlers use refs, never stale

  useEffect(() => {
    if (sleepTimer) timerRef.current = setTimeout(() => { setIsPlaying(false); setSleepTimer(null); }, sleepTimer * 60000);
    return () => clearTimeout(timerRef.current);
  }, [sleepTimer]);

  useEffect(() => {
    document.body.classList.toggle('modal-open', showUpgrade || showTimer);
    return () => document.body.classList.remove('modal-open');
  }, [showUpgrade, showTimer]);

  /* helpers — ref-safe versions to avoid stale closures */
  const canPlay = (idx) => TRACKS[idx].free || isPremiumRef.current;

  const selectTrack = (idx) => {
    if (!TRACKS[idx].free && !isPremium) { setShowUpgrade(true); return; }
    setActiveTrack(idx);
    setBinMode('hybrid');
    setIsPlaying(false);
    setTimeout(() => setIsPlaying(true), 300);
  };

  // nextTrack / prevTrack use refs — always read fresh state, no closure trap
  const nextTrackFn = useCallback(() => {
    const cur  = activeTrackRef.current;
    const shuf = isShuffleRef.current;
    if (shuf) {
      const avail = TRACKS.map((_,i)=>i).filter(i => canPlay(i));
      if (!avail.length) return;
      const pick = avail[Math.floor(Math.random() * avail.length)];
      setActiveTrack(pick); setIsPlaying(false); setTimeout(() => setIsPlaying(true), 300);
    } else {
      for (let i = 1; i <= TRACKS.length; i++) {
        const idx = (cur + i) % TRACKS.length;
        if (canPlay(idx)) { setActiveTrack(idx); setIsPlaying(false); setTimeout(() => setIsPlaying(true), 300); break; }
      }
    }
  }, []);
  useEffect(() => { nextTrackRef.current = nextTrackFn; }, [nextTrackFn]);

  const prevTrack = () => {
    const cur = activeTrackRef.current;
    for (let i = 1; i <= TRACKS.length; i++) {
      const idx = (cur - i + TRACKS.length) % TRACKS.length;
      if (canPlay(idx)) { setActiveTrack(idx); setIsPlaying(false); setTimeout(() => setIsPlaying(true), 300); break; }
    }
  };

  const nextTrack = nextTrackFn; // alias for JSX

  const selectHz = (hz) => {
    const h = HZ[hz];
    if (!h.free && !isPremium) { setShowUpgrade(true); return; }
    setActiveHz(hz);
  };

  // Click su traccia suggerita nel vademecum
  const selectTrackByName = (name) => {
    const idx = TRACKS.findIndex(t => t.name === name);
    if (idx === -1) return;
    selectTrack(idx);
    // Switch to esplora tab so user sees it selected
    setActiveTab('esplora');
  };

  const selectObj = (key) => {
    if (activeObj === key) { setActiveObj(null); return; }
    const obj = OBJECTIVES[key];
    setActiveObj(key);
    const hzFree = HZ[obj.hz]?.free || isPremium;
    const binFree = BINAURAL[obj.bin]?.free || isPremium;
    if (hzFree) setActiveHz(obj.hz);
    if (binFree) setBinRange(obj.bin);
    // Track what's blocked so we can show a contextual notice
    // (state read in render — no extra useState needed, computed inline)
  };

  const toggleBin = () => {
    if (!binOn && !BINAURAL[binRange].free && !isPremium) { setShowUpgrade(true); return; }
    setBinOn(!binOn);
    if (binOn) { stopBin(); }
    else if (isPlaying) { setTimeout(startBin, 100); }
  };

  const handleBinRange = (key) => {
    if (!BINAURAL[key].free && !isPremium) { setShowUpgrade(true); return; }
    setBinRange(key);
    if (binOn && isPlaying) { stopBin(); setTimeout(startBin, 100); }
  };

  /* ── DRAGGABLE PROGRESS BAR ── */
  const progRef    = useRef(null);
  const dragging   = useRef(false);
  const [isDrag, setIsDrag] = useState(false);

  const seekTo = useCallback((clientX) => {
    const el = progRef.current; if (!el) return;
    const r = el.getBoundingClientRect();
    const p = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    if (audioRef.current && !(binMode === 'pure' && binOn))
      audioRef.current.currentTime = p * duration;
  }, [binMode, binOn, duration]);

  const onProgDown = (e) => {
    dragging.current = true; setIsDrag(true);
    seekTo(e.clientX ?? e.touches?.[0]?.clientX);
  };
  const onProgMove = useCallback((e) => {
    if (!dragging.current) return;
    seekTo(e.clientX ?? e.touches?.[0]?.clientX);
  }, [seekTo]);
  const onProgUp = useCallback(() => {
    dragging.current = false; setIsDrag(false);
  }, []);

  useEffect(() => {
    window.addEventListener('mousemove', onProgMove);
    window.addEventListener('mouseup',   onProgUp);
    window.addEventListener('touchmove', onProgMove, { passive: true });
    window.addEventListener('touchend',  onProgUp);
    return () => {
      window.removeEventListener('mousemove', onProgMove);
      window.removeEventListener('mouseup',   onProgUp);
      window.removeEventListener('touchmove', onProgMove);
      window.removeEventListener('touchend',  onProgUp);
    };
  }, [onProgMove, onProgUp]);

  const pct = (binMode === 'pure' && binOn) ? 50 : (duration > 0 ? (currentTime / duration) * 100 : 0);

  /* filtered track list */
  const visibleTracks = activeTab === 'obiettivo' && activeObj
    ? TRACKS.map((t,i) => ({ t, i, rec: t.obj.includes(activeObj) })).sort((a,b) => b.rec - a.rec)
    : TRACKS.map((t,i) => ({ t, i, rec: false }));

  /* ─── RENDER ─── */
  return (
    <>
      <audio
        ref={audioRef}
        preload="metadata"
        onError={() => {
          // Audio non disponibile — non blocchiamo il player
          console.warn('Audio non disponibile:', track?.id);
        }}
      />

      <div className="wrap">

        {/* HEADER — logo row + pill row */}
        <header className="hd">
          <div className="hd-logo-row">
            <div className="logo">
              <span className="logo-text">PureFrequenze</span><span className="logo-dot"/>
              <span className="logo-sub">Frequenze Solfeggio &amp; Battimenti Binaurali</span>
            </div>
            <div className="hd-right">
              {sleepTimer && <div className="sleep-pill">{sleepTimer}′</div>}
            </div>
          </div>
          <div className="hd-pill-row">
            <div
              className={`plan-pill ${isPremium ? (isTrial ? 'trial' : 'premium') : 'free'}`}
              onClick={() => !isPremium && !isTrial && setShowUpgrade(true)}
            >
              {isPremium && !isTrial && 'Premium'}
              {isTrial && `Trial · ${trialDaysLeft} giorni rimasti`}
              {!isPremium && !isTrial && 'Free — sblocca tutto'}
            </div>
          </div>
        </header>

        {/* HZ GRID — grandi, importanti */}
        <div className="hz-label">Frequenza · personalizza il suono</div>
        <div className="hz-grid">
          {Object.entries(HZ).map(([hz, h]) => {
            const hzInt = parseInt(hz);
            const isActive = activeHz === hzInt && !(binMode === 'pure' && binOn);
            const locked = !h.free && !isPremium;
            const isRec = activeObj && OBJECTIVES[activeObj]?.hz === hzInt;
            return (
              <div
                key={hz}
                className={`hz-card ${isActive ? 'active' : ''} ${locked ? 'locked' : ''}`}
                style={{ '--hz-color': h.color }}
                onClick={() => selectHz(hzInt)}
              >
                {isRec && !locked && (
                  <span className="hz-rec">
                    <svg viewBox="0 0 24 24" width="9" height="9" style={{stroke:'var(--gold)',fill:'none',strokeWidth:2,marginRight:3,verticalAlign:'middle'}}>
                      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                    Consigliato
                  </span>
                )}
                {isRec && locked && (
                  <span className="hz-rec" style={{ background:'var(--s2)', borderColor:'var(--bd-md)', color:'var(--t3)' }}>
                    <svg viewBox="0 0 24 24" width="9" height="9" style={{stroke:'var(--t3)',fill:'none',strokeWidth:2,marginRight:3,verticalAlign:'middle'}}>
                      <rect x="3" y="11" width="18" height="11" rx="2"/>
                      <path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    Con Premium
                  </span>
                )}
                <div className="hz-card-num" style={{ color: isActive ? undefined : h.color }}>
                  {locked ? '···' : `${h.label} Hz`}
                </div>
                <div className="hz-card-desc">
                  {locked
                    ? <span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:4,color:'var(--gold)',fontSize:'11px',fontWeight:500}}>
                        <svg viewBox="0 0 24 24" width="11" height="11" style={{stroke:'var(--gold)',fill:'none',strokeWidth:2,flexShrink:0}}>
                          <rect x="3" y="11" width="18" height="11" rx="2"/>
                          <path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                        Premium
                      </span>
                    : h.desc
                  }
                </div>
              </div>
            );
          })}
        </div>

        {/* VADEMECUM — pannello contestuale frequenza */}
        <FreqInfo
          hz={activeHz}
          hzData={HZ[activeHz]}
          info={HZ_INFO[activeHz]}
          onTrackClick={selectTrackByName}
        />

        {/* MAIN GRID */}
        <div className="grid">

          {/* ── PLAYER ── */}
          <div className="player">
            <WaveArt
              color={artColor}
              isPlaying={isPlaying}
              trackName={binMode === 'pure' && binOn ? BINAURAL[binRange].name : track.name}
              hz={activeHz}
              objective={activeObj}
              onPlayHint={() => setIsPlaying(true)}
            />

            <div className="pbody">
              <div className="pmeta">
                <div className="p-tagline">
                  {binOn && binMode === 'pure' ? 'Binaurale puro' : binOn ? 'Binaurale + musica' : 'In riproduzione'}
                </div>
                <div className="p-title">
                  {binOn && binMode === 'pure' ? `${BINAURAL[binRange].name} — ${BINAURAL[binRange].hz} Hz` : track.name}
                </div>
                {!(binOn && binMode === 'pure') && <div className="p-desc">{track.desc}</div>}
              </div>

              {/* progress — draggable, touch-ready */}
              <div className="prog-wrap">
                <div
                  ref={progRef}
                  className={`prog-track ${isDrag ? 'dragging' : ''}`}
                  onMouseDown={onProgDown}
                  onTouchStart={e => onProgDown(e.touches[0])}
                >
                  <div className="prog-rail">
                    <div className="prog-fill" style={{ width: `${pct}%` }}>
                      <div className="prog-thumb" />
                    </div>
                  </div>
                </div>
                <div className="prog-times">
                  <span>{binOn && binMode === 'pure' ? '∞' : fmt(currentTime)}</span>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    {isRepeat && (
                      <span style={{
                        fontFamily:'var(--fm)', fontSize:'10px', fontWeight:600,
                        color:'var(--t1)', background:'var(--s2)',
                        padding:'2px 8px', borderRadius:'4px',
                        border:'1px solid var(--bd-md)',
                        letterSpacing:'.04em', textTransform:'uppercase'
                      }}>
                        Loop
                      </span>
                    )}
                    <span>{binOn && binMode === 'pure' ? 'Continuo' : fmt(duration)}</span>
                  </div>
                </div>
              </div>

              {/* controls */}
              <div className="ctrl-row">
                <button className="cb" onClick={prevTrack}><I.Prev /></button>
                <button className={`play-btn ${isPlaying ? 'on' : ''}`} onClick={() => setIsPlaying(!isPlaying)}>
                  {isPlaying ? <I.Pause /> : <I.Play />}
                </button>
                <button className="cb" onClick={nextTrack}><I.Next /></button>
              </div>
              <div className="sec-row">
                <div className="sec-l">
                  <button className={`cs ${isShuffle ? 'on' : ''}`}
                    title={isShuffle ? 'Casuale attivo' : 'Casuale'}
                    onClick={() => setIsShuffle(!isShuffle)}><I.Shuffle /></button>
                  <button className={`cs ${isRepeat ? 'repeat-on' : ''}`}
                    title={isRepeat ? 'Ripeti traccia — attivo' : 'Ripeti traccia'}
                    onClick={() => setIsRepeat(!isRepeat)}><I.Repeat /></button>
                  <button className={`cs ${sleepTimer ? 'on' : ''}`}
                    title={sleepTimer ? `Timer: ${sleepTimer} min` : 'Sleep timer'}
                    onClick={() => setShowTimer(true)}><I.Clock /></button>
                </div>
                <div className="sec-r">
                  <div className="vol-row">
                    <button className="cs"><I.Vol /></button>
                    <input type="range" className="vol-sl" min="0" max="1" step="0.01" value={volume}
                      onChange={e => setVolume(parseFloat(e.target.value))} />
                  </div>
                </div>
              </div>

              {/* binaurale toggle inline */}
              <div className="bin-row">
                <div className="bin-toggle-row">
                  <div>
                    <div className="bin-label">Battimento Binaurale</div>
                    <div className="bin-sub">Aggiungi uno strato binaural alla traccia</div>
                  </div>
                  <div className={`toggle ${binOn ? 'on' : ''}`} onClick={toggleBin}>
                    <div className="toggle-knob" />
                  </div>
                </div>
                {binOn && (
                  <>
                    <div style={{ display:'flex', gap:'6px', marginBottom:'8px' }}>
                      {['hybrid','pure'].map(m => (
                        <button key={m}
                          style={{ flex:1, padding:'7px', borderRadius:'var(--r-sm)', border:'1px solid var(--bd-md)',
                            background: binMode===m ? 'var(--t1)' : 'var(--s2)',
                            color: binMode===m ? '#fff' : 'var(--t2)', fontSize:'12px', fontWeight:500,
                            cursor:'pointer', transition:'all .18s', fontFamily:'inherit' }}
                          onClick={() => setBinMode(m)}>
                          {m === 'hybrid' ? 'Ibrida' : 'Pura'}
                        </button>
                      ))}
                    </div>
                    <div className="bwave-row">
                      {Object.entries(BINAURAL).map(([k, r]) => {
                        const locked = !r.free && !isPremium;
                        return (
                          <div key={k} className={`bw-btn ${binRange===k?'active':''} ${locked?'locked':''}`}
                            onClick={() => handleBinRange(k)}>
                            <div className="bwn">{r.name}</div>
                            <div className="bwh">{r.hz}</div>
                            <div className="bwd">{r.desc}</div>
                          </div>
                        );
                      })}
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>

          {/* ── RIGHT COL ── */}
          <div>
            <div className="rc-nav">
              {[['obiettivo','Obiettivo'],['esplora','Musica'],['binaurale','Binaurale']].map(([k,l]) => (
                <button key={k} className={`rc-tab ${activeTab===k?'active':''}`} onClick={() => setActiveTab(k)}>{l}</button>
              ))}
            </div>

            {/* OBIETTIVO */}
            {activeTab === 'obiettivo' && (
              <>
                {/* Grid selezione obiettivo */}
                <div className="obj-grid">
                  {Object.entries(OBJECTIVES).map(([key, obj]) => (
                    <button key={key} className={`obj-card ${activeObj===key?'active':''}`}
                      style={{ '--oc': obj.color }} onClick={() => selectObj(key)}>
                      <div className="obj-name">{obj.label}</div>
                      <div className="obj-desc">{obj.desc}</div>
                    </button>
                  ))}
                </div>

                {/* Card raccomandazione singola */}
                {activeObj && (() => {
                  const obj = OBJECTIVES[activeObj];
                  const recTrack = TRACKS.find(t => t.id === obj.track);
                  const recGroup = GROUPS.find(g => g.id === obj.group);
                  const recTrackIdx = TRACKS.indexOf(recTrack);
                  const hzBlocked = !HZ[obj.hz]?.free && !isPremium;
                  const binBlocked = !BINAURAL[obj.bin]?.free && !isPremium;
                  const groupLocked = recGroup?.tier === 'premium' && !isPremium;
                  const isActive = activeTrack === recTrackIdx;
                  const isNowPlaying = isActive && isPlaying;

                  return (
                    <div style={{ marginTop:'20px', background:'var(--surface)', border:'1.5px solid var(--bd-md)', borderRadius:'var(--r-lg)', padding:'20px', boxShadow:'var(--sh-md)' }}>
                      {/* Label */}
                      <div style={{ fontSize:'11px', fontWeight:600, letterSpacing:'.1em', textTransform:'uppercase', color:'var(--t3)', marginBottom:'14px' }}>
                        Configurazione consigliata
                      </div>

                      {/* Gruppo + traccia */}
                      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'16px' }}>
                        <div>
                          <div style={{ fontSize:'22px', fontWeight:700, color:'var(--t1)', letterSpacing:'.01em' }}>
                            {recGroup?.name}
                            {groupLocked && <span style={{ fontSize:'12px', fontWeight:500, color:'var(--gold)', background:'var(--gold-bg)', border:'1px solid var(--gold-lt)', padding:'2px 8px', borderRadius:'4px', marginLeft:'8px' }}>Premium</span>}
                          </div>
                          <div style={{ fontSize:'13px', color:'var(--t3)', marginTop:'3px' }}>
                            {recTrack?.name} · {recTrack?.desc}
                          </div>
                        </div>
                        {/* Play button */}
                        {!groupLocked && (
                          <button
                            style={{ width:'48px', height:'48px', borderRadius:'50%', border:'none', background: isNowPlaying ? 'var(--t2)' : 'var(--t1)', color:'var(--surface)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}
                            onClick={() => selectTrack(recTrackIdx)}>
                            {isNowPlaying ? <I.Pause /> : <I.Play />}
                          </button>
                        )}
                        {groupLocked && (
                          <button
                            style={{ padding:'10px 18px', borderRadius:'var(--r-md)', border:'none', background:'var(--gold)', color:'#fff', cursor:'pointer', fontSize:'13px', fontWeight:600 }}
                            onClick={() => setShowUpgrade(true)}>
                            Sblocca
                          </button>
                        )}
                      </div>

                      {/* Hz + Binaural chips */}
                      <div style={{ display:'flex', gap:'8px', flexWrap:'wrap' }}>
                        <div style={{ display:'flex', alignItems:'center', gap:'6px', background:'var(--s2)', borderRadius:'var(--r-sm)', padding:'8px 12px' }}>
                          <span style={{ fontSize:'11px', color:'var(--t3)', letterSpacing:'.06em', textTransform:'uppercase' }}>Frequenza</span>
                          <span style={{ fontSize:'14px', fontWeight:700, color: hzBlocked ? 'var(--t3)' : (HZ[obj.hz]?.color || 'var(--t1)'), display:'flex', alignItems:'center', gap:'4px' }}>
                            {hzBlocked && <svg viewBox="0 0 24 24" width="12" height="12" style={{ strokeWidth:2, stroke:'currentColor', fill:'none' }}><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>}
                            {obj.hz} Hz · {HZ[obj.hz]?.desc}
                          </span>
                        </div>
                        <div style={{ display:'flex', alignItems:'center', gap:'6px', background:'var(--s2)', borderRadius:'var(--r-sm)', padding:'8px 12px' }}>
                          <span style={{ fontSize:'11px', color:'var(--t3)', letterSpacing:'.06em', textTransform:'uppercase' }}>Onda</span>
                          <span style={{ fontSize:'14px', fontWeight:700, color: binBlocked ? 'var(--t3)' : 'var(--t1)', display:'flex', alignItems:'center', gap:'4px' }}>
                            {binBlocked && <svg viewBox="0 0 24 24" width="12" height="12" style={{ strokeWidth:2, stroke:'currentColor', fill:'none' }}><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>}
                            {BINAURAL[obj.bin]?.name} · {BINAURAL[obj.bin]?.desc}
                          </span>
                        </div>
                      </div>

                      {/* Avviso premium se bloccato */}
                      {(hzBlocked || binBlocked) && !groupLocked && (
                        <div style={{ marginTop:'12px', fontSize:'12px', color:'var(--t3)', display:'flex', alignItems:'center', gap:'6px' }}>
                          <span>La configurazione ottimale richiede Premium.</span>
                          <button style={{ fontSize:'12px', color:'var(--gold)', background:'none', border:'none', cursor:'pointer', fontWeight:600, padding:0 }} onClick={() => setShowUpgrade(true)}>Sblocca →</button>
                        </div>
                      )}
                    </div>
                  );
                })()}
              </>
            )}

            {/* ESPLORA — gruppi */}
            {activeTab === 'esplora' && (
              <div>
                {GROUPS.map(group => {
                  const groupTracks = TRACKS.filter(t => t.group === group.id);
                  const groupLocked = group.tier === 'premium' && !isPremium;
                  return (
                    <div key={group.id} style={{ marginBottom:'28px' }}>
                      <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom:'10px', paddingBottom:'8px', borderBottom:'1px solid var(--bd)' }}>
                        <div>
                          <span style={{ fontFamily:'var(--fd)', fontSize:'20px', fontWeight:600, color: groupLocked ? 'var(--t3)' : 'var(--t1)' }}>{group.name}</span>
                          <span style={{ fontFamily:'var(--fj)', fontSize:'11px', color:'var(--t3)', marginLeft:'10px' }}>{group.tagline}</span>
                        </div>
                        {groupLocked && <span style={{ fontFamily:'var(--fj)', fontSize:'9px', fontWeight:600, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--gold)', background:'var(--gold-bg)', border:'1px solid var(--gold-lt)', padding:'3px 10px', borderRadius:'4px' }}>Premium</span>}
                      </div>
                      <div className="track-list">
                        {groupTracks.map((t, varIdx) => {
                          const locked = groupLocked;
                          const globalIdx = TRACKS.indexOf(t);
                          const isActive = activeTrack === globalIdx;
                          const isNowPlaying = isActive && isPlaying;
                          return (
                            <div key={t.id} className={`track-row ${isActive?'active':''} ${locked?'locked':''}`}
                              style={{ '--art-color': HZ[activeHz]?.color || 'var(--t1)' }}
                              onClick={() => selectTrack(globalIdx)}>
                              <div className={`tr-num ${isNowPlaying?'playing':''}`}>
                                {isNowPlaying ? <><span/><span/><span/></> : varIdx + 1}
                              </div>
                              <div className="tr-info">
                                <div className="tr-name">{t.name}</div>
                                <div className="tr-desc">{t.desc}</div>
                              </div>
                              <div className="tr-right">
                                <span className="tr-dur">{fmt(t.dur)}</span>
                                {t.free && <span className="badge-free">Free</span>}
                                {locked && <div className="tr-lock"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {/* BINAURALE TAB */}
            {activeTab === 'binaurale' && (
              <div>
                <p className="bin-intro">
                  I battimenti binaurali sono illusioni uditive create quando ascolti due toni leggermente diversi, uno per orecchio. Il cervello percepisce la differenza come un battito ritmico. In modalità ibrida si sovrappongono alla traccia musicale scelta. Richiedono cuffie stereo.
                </p>
                <div className="bin-modes">
                  {[['hybrid','Ibrida','Battimenti + musica. Esperienza completa e immersiva.'],
                    ['pure','Pura','Solo battimenti, generati in tempo reale. Nessuna musica.']].map(([m,t,d]) => (
                    <div key={m} className={`bmode ${binMode===m&&binOn?'active':''}`} onClick={() => { setBinMode(m); if (!binOn) { setBinOn(true); if (isPlaying) setTimeout(startBin,100); } }}>
                      <div className="bmt">{t}</div>
                      <div className="bmd">{d}</div>
                    </div>
                  ))}
                </div>
                <div className="bwave-grid-lg">
                  {Object.entries(BINAURAL).map(([k,r]) => {
                    const locked = !r.free && !isPremium;
                    return (
                      <div key={k} className={`bwl ${binRange===k?'active':''} ${locked?'locked':''}`}
                        onClick={() => handleBinRange(k)}>
                        <div className="bwln">{r.name}</div>
                        <div className="bwlh">{r.hz} Hz</div>
                        <div className="bwld">{r.desc}</div>
                        {locked && (
                          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:3,marginTop:6,color:'var(--gold)',fontSize:'10px',fontWeight:500}}>
                            <svg viewBox="0 0 24 24" width="10" height="10" style={{stroke:'var(--gold)',fill:'none',strokeWidth:2}}>
                              <rect x="3" y="11" width="18" height="11" rx="2"/>
                              <path d="M7 11V7a5 5 0 0110 0v4"/>
                            </svg>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                <div className="warn-box">
                  <I.Warn />
                  <span><strong>Cuffie obbligatorie.</strong> Senza cuffie stereo i battimenti binaurali non funzionano.</span>
                </div>
              </div>
            )}
          </div>
        </div>

        {/* NOTA */}
        <div className="sci-note">
          <p><strong>Nota scientifica.</strong> Le frequenze Solfeggio si basano su tradizioni storiche e ricerca preliminare. I battimenti binaurali mostrano evidenze contrastanti. Gli effetti variano individualmente e non sostituiscono cure mediche professionali.</p>
        </div>
      </div>

      {/* UPGRADE MODAL */}
      {showUpgrade && (
        <div className="modal-bg" onClick={() => setShowUpgrade(false)}>
          <div className="modal-card" onClick={e => e.stopPropagation()}>
            <button className="modal-x" onClick={() => setShowUpgrade(false)}>×</button>
            <div className="m-eyebrow">PureFrequenze Premium</div>
            <div className="m-title">Sblocca tutto.</div>
            <div className="m-sub">35 tracce premium in 7 gruppi esclusivi, 7 frequenze Hz avanzate, tutte le onde cerebrali.</div>
            <div className="feat-list">
              {[
                ['50 tracce totali','15 free + 35 premium — 10 gruppi con identita psicoacustica precisa'],
                ['10 frequenze Solfeggio','Da 174 Hz a 963 Hz — sinusoide generata live in tempo reale'],
                ['Tutte le onde cerebrali','Delta, Theta, Alpha, Beta, Gamma — pura e ibrida'],
                ['Sleep timer avanzato','15, 45 e 90 minuti con dissolvenza automatica'],
                ['Aggiornamenti continui','Nuove tracce aggiunte nel tempo'],
              ].map(([t,d]) => (
                <div key={t} className="feat">
                  <div className="feat-ck"><I.Check /></div>
                  <div className="feat-tx"><strong>{t}</strong><br/>{d}</div>
                </div>
              ))}
            </div>
            <div className="price-row">
              {[
                { id:'monthly', label:'Mensile',  price:'€4,99',  per:'/mese',  save:null,   best:false },
                { id:'annual',  label:'Annuale',  price:'€34,99', per:'/anno',  save:'−42%', best:true  },
              ].map(o => (
                <div key={o.id} className={`po ${o.best?'best':''} ${selPrice===o.id&&!o.best?'sel':''}`} onClick={() => setSelPrice(o.id)}>
                  <div className="po-l">{o.label}</div>
                  <div className="po-p">{o.price}</div>
                  <div className="po-per">{o.per}</div>
                  {o.save && <div className="po-sv">{o.save}</div>}
                </div>
              ))}
            </div>
            <button className="up-cta" onClick={async () => {
              const priceId = STRIPE[selPrice];
              const url = await createStripeCheckout(priceId, userId);
              if (url) window.location.href = url;
            }}>
              Prova gratis 7 giorni
            </button>
            <p className="m-fn">Rinnovo automatico · Cancella quando vuoi · Nessun vincolo</p>
          </div>
        </div>
      )}

      {/* TIMER MODAL */}
      {showTimer && (
        <div className="modal-bg" onClick={() => setShowTimer(false)}>
          <div className="modal-card" style={{ maxWidth:'340px' }} onClick={e => e.stopPropagation()}>
            <button className="modal-x" onClick={() => setShowTimer(false)}>×</button>
            <div className="m-eyebrow">Sleep Timer</div>
            <div className="m-title" style={{ fontSize:'22px' }}>Arresto automatico</div>
            <div className="timer-grid">
              {[{m:15,lock:!isPremium},{m:30,lock:false},{m:45,lock:!isPremium},{m:60,lock:false},{m:90,lock:!isPremium},{m:null,label:'Off',lock:false}].map(o => (
                <div key={o.m??'off'} className={`t-opt ${sleepTimer===o.m?'sel':''}`}
                  onClick={() => {
                    if (o.lock) { setShowUpgrade(true); setShowTimer(false); return; }
                    if (o.m === null) { setSleepTimer(null); clearTimeout(timerRef.current); setShowTimer(false); }
                    else { setSleepTimer(o.m); setShowTimer(false); }
                  }}>
                  {o.lock && <div className="t-lk"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>}
                  {o.label ?? `${o.m}′`}
                </div>
              ))}
            </div>
            {sleepTimer && <p style={{ textAlign:'center', marginTop:'12px', fontSize:'13px', color:'var(--t2)' }}>Timer attivo: {sleepTimer} minuti</p>}
          </div>
        </div>
      )}
    </>
  );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
