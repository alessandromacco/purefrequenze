<!DOCTYPE html>
<!--
  PUREFREQUENZE v5.0
  Architettura: 3 layer live (texture + sinusoide solfeggio + binaural)
  Tracce: 50 (15 free · 35 premium) — 10 gruppi x 5 varianti
  Hz: 10 solfeggio (174-963) — sinusoide generata live via Web Audio API
  R2: purefrequenze-audio/tracks/ — file piatti, no subfolder Hz
-->
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PureFrequenze — Frequenze solfeggio e battimenti binaurali di qualità professionale.">
  <title>PureFrequenze</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=DM+Mono:wght@400&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>

  <style>
    :root {
      --bg:        #F3F1ED;
      --surface:   #FEFCF9;
      --s2:        #ECEAE4;
      --s3:        #E3E0D8;
      --t1:        #16130C;
      --t2:        #524D45;
      --t3:        #78726A;   /* darkened: 5.2:1 ratio — WCAG AA compliant */
      --gold:      #B8902E;
      --gold-lt:   #EEE0B8;
      --gold-bg:   #FAF4E4;
      --bd:        rgba(22,19,12,.07);
      --bd-md:     rgba(22,19,12,.13);
      --sh-sm:     0 1px 3px rgba(22,19,12,.05),0 1px 2px rgba(22,19,12,.04);
      --sh-md:     0 4px 16px rgba(22,19,12,.07),0 2px 6px rgba(22,19,12,.04);
      --sh-lg:     0 12px 40px rgba(22,19,12,.09),0 4px 16px rgba(22,19,12,.05);
      --r-sm:  8px; --r-md: 14px; --r-lg: 22px; --r-xl: 28px;
      --fd: 'Inter',system-ui,sans-serif;
      --fb: 'Inter',system-ui,sans-serif;
      --fj: 'Inter',sans-serif;
      --fm: 'DM Mono','Courier New',monospace;
      --ease: cubic-bezier(.4,0,.2,1);
      /* 3D contour system */
      --edge-light: rgba(255,255,255,.82);
      --edge-dark:  rgba(22,19,12,.09);
      --btn-sh:
        inset 0 1px 0 var(--edge-light),
        inset 0 -1px 0 var(--edge-dark),
        inset 1px 0 0 rgba(255,255,255,.5),
        inset -1px 0 0 rgba(22,19,12,.05),
        0 2px 6px rgba(22,19,12,.1),
        0 1px 2px rgba(22,19,12,.07);
      --btn-sh-hover:
        inset 0 1px 0 rgba(255,255,255,.92),
        inset 0 -1px 0 rgba(22,19,12,.11),
        inset 1px 0 0 rgba(255,255,255,.6),
        inset -1px 0 0 rgba(22,19,12,.06),
        0 5px 14px rgba(22,19,12,.13),
        0 2px 4px rgba(22,19,12,.09);
      --btn-sh-active:
        inset 0 2px 6px rgba(22,19,12,.14),
        inset 0 1px 3px rgba(22,19,12,.1),
        0 1px 2px rgba(22,19,12,.05);
    }

    /* ── GRAIN TEXTURE ── */
    body::after {
      content:'';
      position:fixed;inset:0;
      pointer-events:none;z-index:9000;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-repeat:repeat;
      background-size:200px 200px;
      opacity:.022;
      mix-blend-mode:multiply;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--fb);background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}
    button{font-family:inherit;cursor:pointer;border:none;background:none}

    /* ── WRAP ── */
    .wrap{max-width:1360px;margin:0 auto;padding:0 24px 80px}

    /* ── HEADER — Logo dominante ── */
    .hd{padding:28px 0 0;margin-bottom:24px}
    .hd-logo-row{
      display:flex;align-items:flex-end;justify-content:space-between;
      padding-bottom:20px;border-bottom:1px solid var(--bd);margin-bottom:14px;
    }
    .logo{line-height:1}
    .logo-text{
      font-family:'Inter',sans-serif;
      font-size:90px;font-weight:900;
      letter-spacing:18px;text-transform:uppercase;
      color:var(--t1);user-select:none;line-height:.88;
      text-shadow:
        0 1px 0 rgba(255,255,255,.95),
        0 2px 0 rgba(22,19,12,.08),
        0 5px 22px rgba(22,19,12,.06);
    }
    .logo-dot{
      display:inline-block;width:12px;height:12px;border-radius:50%;
      background:var(--gold);margin-left:4px;vertical-align:super;
      animation:dot-pulse 3s ease-in-out infinite;
      box-shadow:0 2px 8px rgba(184,144,46,.45);
    }
    @keyframes dot-pulse{
      0%,100%{box-shadow:0 2px 6px rgba(184,144,46,.35)}
      50%{box-shadow:0 2px 16px rgba(184,144,46,.7),0 0 28px rgba(184,144,46,.14)}
    }
    .logo-sub{
      display:block;font-family:'Inter',sans-serif;
      font-size:15px;font-weight:400;letter-spacing:.18em;text-transform:uppercase;
      color:var(--t2);margin-top:13px;
    }
    .hd-right{display:flex;align-items:center;gap:10px}
    .hd-pill-row{
      display:flex;align-items:center;justify-content:flex-end;
      gap:10px;margin-bottom:26px;
    }
    .plan-pill{
      font-family:'Inter',sans-serif;
      font-size:12px;font-weight:600;letter-spacing:.04em;
      padding:9px 20px;border-radius:8px;
      border:1px solid var(--bd-md);color:var(--t2);background:var(--surface);
      cursor:default;transition:all .2s var(--ease);box-shadow:var(--btn-sh);
    }
    .plan-pill.premium{background:var(--gold-bg);border-color:var(--gold-lt);color:var(--gold)}
    .plan-pill.trial{background:rgba(99,102,241,0.1);border-color:rgba(99,102,241,0.3);color:#818cf8;cursor:default}
    .plan-pill.free{cursor:pointer}
    .plan-pill.free:hover{border-color:var(--gold);color:var(--gold);box-shadow:var(--btn-sh-hover)}
    .sleep-pill{font-family:var(--fm);font-size:12px;color:var(--gold);background:var(--gold-bg);padding:6px 14px;border-radius:8px;border:1px solid var(--gold-lt);box-shadow:var(--btn-sh)}

    /* ── FOCUS VISIBLE — accessibilità tastiera ── */
    :focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}
    .play-btn:focus-visible,.cb:focus-visible,.cs:focus-visible{outline:2px solid var(--gold);outline-offset:3px}

    /* ── HZ GRID ── */
    .hz-label{
      font-family:'Inter',sans-serif;
      font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
      color:var(--t3);margin-bottom:13px;
    }
    .hz-grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      margin-bottom:32px;
    }
    .hz-card{
      padding:20px 10px 16px;
      border-radius:12px;
      border:1.5px solid var(--bd-md);
      background:var(--surface);
      cursor:pointer;
      transition:all .16s var(--ease);
      text-align:center;
      position:relative;
      box-shadow:var(--btn-sh);
      overflow:visible;
    }
    .hz-card:hover{
      transform:translateY(-3px);
      box-shadow:var(--btn-sh-hover);
      border-color:var(--hz-color,var(--bd-md));
      background:var(--surface);
    }
    .hz-card:active{box-shadow:var(--btn-sh-active);transform:translateY(1px)}
    .hz-card.active{
      background:var(--hz-color,var(--t1));
      border-color:var(--hz-color,var(--t1));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        inset 0 -2px 0 rgba(0,0,0,.18),
        0 8px 24px rgba(0,0,0,.2),
        0 2px 6px rgba(0,0,0,.12);
    }
    /* Ambient glow under active card */
    .hz-card.active::after{
      content:'';position:absolute;
      bottom:-16px;left:10%;right:10%;height:26px;
      background:var(--hz-color,var(--t1));
      filter:blur(14px);opacity:.32;
      border-radius:50%;pointer-events:none;
    }
    .hz-card-num{
      font-family:'Inter',sans-serif;
      font-size:42px;font-weight:700;
      color:var(--hz-color,var(--t1));
      line-height:1;margin-bottom:8px;
      transition:color .14s;
    }
    .hz-card.active .hz-card-num{color:rgba(255,255,255,.97) !important}
    .hz-card-desc{
      font-family:'Inter',sans-serif;
      font-size:12px;font-weight:500;color:var(--t3);
      line-height:1.3;letter-spacing:.02em;
    }
    .hz-card.active .hz-card-desc{color:rgba(255,255,255,.72)}
    .hz-card.locked .hz-card-num{filter:blur(4px);user-select:none}
    .hz-rec{
      position:absolute;top:-9px;left:50%;transform:translateX(-50%);
      font-family:'Inter',sans-serif;
      font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
      color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-lt);
      padding:2px 9px;border-radius:4px;white-space:nowrap;
      box-shadow:0 1px 4px rgba(184,144,46,.18);
    }

    /* ── GRID ── */
    .grid{display:grid;grid-template-columns:400px 1fr;gap:24px;align-items:start}

    /* ── PLAYER — 3D card ── */
    .player{
      background:var(--surface);border-radius:var(--r-xl);
      border-top:1px solid rgba(255,255,255,.8);
      border-left:1px solid rgba(255,255,255,.55);
      border-right:1px solid var(--bd-md);
      border-bottom:1px solid var(--bd-md);
      box-shadow:var(--sh-lg),inset 0 1px 0 rgba(255,255,255,.85);
      overflow:hidden;
    }

    /* Oscilloscope art */
    .art{width:100%;height:220px;position:relative;overflow:hidden}
    .art-bg{position:absolute;inset:0;background:var(--art-color,#16130C);transition:background .7s var(--ease)}
    /* Scanlines — subtle CRT depth */
    .art-scan{
      position:absolute;inset:0;pointer-events:none;z-index:5;
      background:repeating-linear-gradient(
        180deg,
        transparent 0,transparent 2px,
        rgba(0,0,0,.055) 2px,rgba(0,0,0,.055) 3px
      );
    }
    /* Vignette edges */
    .art-vig{
      position:absolute;inset:0;pointer-events:none;z-index:5;
      background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.35) 100%);
    }
    .art-grid{position:absolute;inset:0;pointer-events:none;z-index:3}
    .art-grid svg{width:100%;height:100%}
    .art-wave{position:absolute;inset:0;pointer-events:none;z-index:4}
    .art-wave svg{width:100%;height:100%;overflow:visible}
    .wv-main{fill:none;stroke:rgba(255,255,255,.52);stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round}
    .wv-sub {fill:none;stroke:rgba(255,255,255,.2); stroke-width:.7; stroke-linecap:round;stroke-linejoin:round}
    .wv-ghost{fill:none;stroke:rgba(255,255,255,.07);stroke-width:.5; stroke-linecap:round;stroke-linejoin:round}
    @keyframes wscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .playing .wv-scroll  {animation:wscroll 14s linear infinite;will-change:transform;contain:layout style}
    .playing .wv-scroll-b{animation:wscroll 22s linear infinite reverse;will-change:transform;contain:layout style}
    /* Labels */
    .art-name{
      position:absolute;bottom:16px;left:18px;
      font-family:'Inter',sans-serif;font-size:20px;font-weight:700;
      letter-spacing:-.01em;
      color:rgba(255,255,255,.95);text-shadow:0 2px 16px rgba(0,0,0,.55);
      pointer-events:none;line-height:1;z-index:6;
    }
    .art-hz{
      position:absolute;top:12px;right:12px;
      font-family:var(--fm);font-size:10px;
      color:rgba(255,255,255,.85);background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.13);border-radius:4px;
      padding:3px 9px;letter-spacing:.08em;z-index:6;
    }
    .art-obj{
      position:absolute;top:12px;left:12px;
      font-family:'Inter',sans-serif;font-size:9px;font-weight:600;
      letter-spacing:.1em;text-transform:uppercase;
      color:rgba(255,255,255,.75);background:rgba(0,0,0,.33);
      border:1px solid rgba(255,255,255,.1);border-radius:4px;
      padding:3px 9px;z-index:6;
    }
    /* Ambient glow bleeds below art into player body */
    .art-glow-wrap{position:relative;overflow:visible}
    .art-glow{
      position:absolute;bottom:-18px;left:15%;right:15%;height:36px;
      background:var(--art-color,#16130C);
      filter:blur(20px);opacity:.28;
      border-radius:50%;pointer-events:none;z-index:1;
    }

    .pbody{padding:20px 22px;position:relative;z-index:2}
    .pmeta{margin-bottom:16px}
    .p-tagline{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
    .p-title{font-family:'Inter',sans-serif;font-size:27px;font-weight:700;color:var(--t1);line-height:1.2}
    .p-desc{font-size:16px;color:var(--t2);margin-top:5px;line-height:1.5}

    /* progress */
    .prog-wrap{margin-bottom:16px;user-select:none}
    .prog-track{width:100%;height:38px;display:flex;align-items:center;cursor:pointer;position:relative}
    .prog-rail{width:100%;height:4px;background:var(--bd-md);border-radius:2px;position:relative;pointer-events:none;box-shadow:inset 0 1px 2px rgba(0,0,0,.1)}
    .prog-fill{height:100%;border-radius:2px;background:var(--t1);position:relative;pointer-events:none}
    .prog-thumb{position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:15px;height:15px;border-radius:50%;background:var(--t1);pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 1px 4px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.2)}
    .prog-track:hover .prog-thumb,.prog-track.dragging .prog-thumb{opacity:1}
    .prog-times{display:flex;justify-content:space-between;margin-top:6px;font-family:var(--fm);font-size:13px;color:var(--t3)}

    /* controls — 3D */
    .ctrl-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px}
    .cb{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .15s var(--ease);background:var(--surface);border:1px solid var(--bd-md);box-shadow:var(--btn-sh)}
    .cb svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2}
    .cb:hover{color:var(--t1);box-shadow:var(--btn-sh-hover);transform:translateY(-1px)}
    .cb:active{box-shadow:var(--btn-sh-active);transform:translateY(1px)}
    .cb.on{color:var(--t1);background:var(--s2)}
    .play-btn{
      width:58px;height:58px;border-radius:50%;background:var(--t1);
      display:flex;align-items:center;justify-content:center;
      transition:all .18s var(--ease);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.13),
        inset 0 -2px 0 rgba(0,0,0,.22),
        0 6px 20px rgba(22,19,12,.3),
        0 2px 6px rgba(22,19,12,.18);
    }
    .play-btn svg{width:20px;height:20px;stroke:none;fill:#fff;margin-left:3px}
    .play-btn.on svg{margin-left:0}
    .play-btn:hover{
      transform:translateY(-2px);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.15),inset 0 -2px 0 rgba(0,0,0,.24),0 10px 28px rgba(22,19,12,.32),0 4px 10px rgba(22,19,12,.2);
    }
    .play-btn:active{
      transform:translateY(1px);
      box-shadow:inset 0 3px 8px rgba(0,0,0,.3),0 1px 3px rgba(22,19,12,.15);
    }

    .sec-row{display:flex;align-items:center;justify-content:space-between}
    .sec-l,.sec-r{display:flex;align-items:center;gap:4px}
    .cs{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .15s var(--ease);position:relative;background:var(--surface);border:1px solid var(--bd-md);box-shadow:var(--btn-sh)}
    .cs svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
    .cs:hover{color:var(--t1);box-shadow:var(--btn-sh-hover);transform:translateY(-1px)}
    .cs:active{box-shadow:var(--btn-sh-active);transform:translateY(1px)}
    .cs.on{color:var(--t1);background:var(--s2)}
    .cs.on::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px rgba(184,144,46,.6)}
    /* Repeat specifico — più visibile, è fondamentale */
    .cs.repeat-on{
      color:white !important;
      background:var(--t1) !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        inset 0 -2px 0 rgba(0,0,0,.18),
        0 3px 12px rgba(22,19,12,.25) !important;
    }
    .cs.repeat-on::after{display:none}
    .vol-row{display:flex;align-items:center;gap:6px}
    .vol-sl{-webkit-appearance:none;appearance:none;width:68px;height:4px;border-radius:2px;background:var(--bd-md);outline:none;cursor:pointer;box-shadow:inset 0 1px 2px rgba(0,0,0,.1)}
    .vol-sl::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--t1);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.15)}

    /* binaural in player */
    .bin-row{
      margin-top:16px;padding-top:16px;
      border-top:1px solid rgba(255,255,255,.55);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.4);
    }
    .bin-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .bin-label{font-size:17px;font-weight:600;color:var(--t1)}
    .bin-sub{font-size:13px;color:var(--t3);margin-top:2px}
    .toggle{width:40px;height:23px;border-radius:100px;background:var(--s3);border:1px solid var(--bd-md);position:relative;cursor:pointer;transition:background .2s var(--ease);flex-shrink:0;box-shadow:inset 0 1px 3px rgba(22,19,12,.1),0 1px 0 rgba(255,255,255,.7)}
    .toggle.on{background:var(--t1);border-color:var(--t1)}
    .toggle-knob{position:absolute;top:3px;left:3px;width:15px;height:15px;border-radius:50%;background:#fff;transition:transform .2s var(--ease);box-shadow:0 1px 3px rgba(22,19,12,.2),inset 0 1px 0 rgba(255,255,255,.8)}
    .toggle.on .toggle-knob{transform:translateX(17px)}
    .bwave-row{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
    .bw-btn{
      padding:10px 4px;border-radius:var(--r-sm);
      border:1px solid var(--bd-md);background:var(--s2);
      text-align:center;cursor:pointer;transition:all .18s var(--ease);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.6),inset 1px 0 0 rgba(255,255,255,.3),0 1px 2px rgba(22,19,12,.06);
    }
    .bw-btn:hover{background:var(--s3);transform:translateY(-1px)}
    .bw-btn:active{box-shadow:var(--btn-sh-active);transform:translateY(1px)}
    .bw-btn.active{
      background:var(--t1);border-color:var(--t1);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.1),inset 0 -2px 0 rgba(0,0,0,.18);
    }
    .bw-btn.active .bwn,.bw-btn.active .bwh,.bw-btn.active .bwd{color:#fff}
    .bwn{font-size:13px;font-weight:600;color:var(--t1)}
    .bwh{font-family:var(--fm);font-size:11px;color:var(--gold);margin:2px 0}
    .bwd{font-size:11px;color:var(--t3);line-height:1.3}
    .bw-btn.locked .bwn{opacity:.4}

    /* ── RIGHT COL ── */
    .rc-nav{
      display:flex;gap:2px;margin-bottom:20px;
      background:var(--s2);border-radius:var(--r-md);padding:4px;width:fit-content;
      box-shadow:inset 0 1px 3px rgba(22,19,12,.1),0 1px 0 rgba(255,255,255,.8);
    }
    .rc-tab{padding:8px 20px;border-radius:var(--r-sm);font-size:16px;font-weight:500;color:var(--t2);transition:all .18s var(--ease)}
    .rc-tab:hover{color:var(--t1)}
    .rc-tab.active{
      background:var(--surface);color:var(--t1);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.8),0 1px 4px rgba(22,19,12,.1);
    }

    /* ── OBJECTIVES ── */
    .obj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
    .obj-card{
      padding:16px 14px;border-radius:var(--r-md);
      border-top:1px solid rgba(255,255,255,.7);
      border-left:1px solid rgba(255,255,255,.5);
      border-right:1px solid rgba(22,19,12,.09);
      border-bottom:1px solid rgba(22,19,12,.11);
      background:var(--surface);cursor:pointer;
      transition:all .2s var(--ease);text-align:left;position:relative;overflow:hidden;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 2px 8px rgba(22,19,12,.07);
    }
    .obj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--oc,var(--t3));opacity:0;transition:opacity .2s}
    .obj-card:hover{background:var(--s2);transform:translateY(-2px);box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 6px 18px rgba(22,19,12,.1)}
    .obj-card:hover::before{opacity:.6}
    .obj-card.active{
      border-color:var(--oc,var(--t1));
      border-top-color:var(--oc,var(--t1));
      border-left-color:var(--oc,var(--t1));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 4px 14px rgba(22,19,12,.1);
    }
    .obj-card.active::before{opacity:1}
    .obj-name{font-size:18px;font-weight:600;color:var(--t1);margin-bottom:4px}
    .obj-desc{font-size:14px;color:var(--t3);line-height:1.4}
    .obj-rec{display:flex;align-items:center;gap:5px;margin-top:10px;flex-wrap:wrap}
    .obj-hz{
      font-family:var(--fm);font-size:12px;color:white;
      padding:3px 9px;border-radius:6px;
      display:inline-flex;align-items:center;gap:4px;
    }
    .obj-hz.blocked{
      background:var(--s3) !important;
      color:var(--t3);
      border:1px solid var(--bd-md);
    }
    .obj-hz.blocked svg{width:10px;height:10px;stroke:var(--t3);fill:none;stroke-width:2;flex-shrink:0}
    .obj-wave{font-size:12px;color:var(--t3)}

    /* ── AVVISO FREQUENZA BLOCCATA ── */
    .obj-notice{
      display:flex;align-items:center;gap:12px;
      margin-bottom:14px;
      padding:13px 16px;border-radius:var(--r-md);
      background:var(--gold-bg);
      border-top:1px solid rgba(255,255,255,.7);
      border-left:2px solid var(--gold);
      border-right:1px solid rgba(22,19,12,.08);
      border-bottom:1px solid rgba(22,19,12,.1);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 2px 8px rgba(184,144,46,.08);
      animation:fi-in .3s ease;
    }
    .obj-notice-icon{
      width:32px;height:32px;border-radius:50%;
      background:rgba(184,144,46,.15);border:1px solid var(--gold-lt);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .obj-notice-icon svg{width:14px;height:14px;stroke:var(--gold);fill:none;stroke-width:2}
    .obj-notice-text{flex:1;min-width:0}
    .obj-notice-title{
      font-size:13px;font-weight:600;color:var(--t1);margin-bottom:2px;
    }
    .obj-notice-sub{font-size:12px;color:var(--t2);line-height:1.4}
    .obj-notice-sub strong{color:var(--gold);font-weight:600}
    .obj-notice-btn{
      font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
      padding:7px 14px;border-radius:7px;border:none;cursor:pointer;
      background:var(--gold);color:white;
      box-shadow:0 2px 8px rgba(184,144,46,.3);
      transition:all .18s var(--ease);flex-shrink:0;
      white-space:nowrap;
    }
    .obj-notice-btn:hover{opacity:.88;transform:translateY(-1px)}

    /* ── TRACK LIST ── */
    .track-list{display:flex;flex-direction:column;gap:7px}
    .track-row{
      display:flex;align-items:center;gap:13px;
      padding:14px 16px;border-radius:var(--r-md);
      border-top:1px solid rgba(255,255,255,.68);
      border-left:1px solid rgba(255,255,255,.48);
      border-right:1px solid rgba(22,19,12,.09);
      border-bottom:1px solid rgba(22,19,12,.11);
      background:var(--surface);cursor:pointer;
      transition:all .18s var(--ease);position:relative;overflow:hidden;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 1px 4px rgba(22,19,12,.06);
    }
    .track-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--art-color,var(--t1));opacity:0;transition:opacity .2s;border-radius:0 2px 2px 0}
    .track-row:hover{background:var(--s2);transform:translateX(3px);box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 3px 10px rgba(22,19,12,.09)}
    .track-row:hover::before{opacity:.4}
    .track-row.active{background:var(--surface)}
    .track-row.active::before{opacity:1}
    .tr-num{font-family:var(--fm);font-size:12px;color:var(--t3);width:20px;text-align:center;flex-shrink:0}
    .tr-num.playing{display:flex;align-items:flex-end;gap:2px;height:15px}
    .tr-num.playing span{width:3px;border-radius:2px;background:var(--t1);animation:bar .8s ease-in-out infinite}
    .tr-num.playing span:nth-child(2){animation-delay:.15s}
    .tr-num.playing span:nth-child(3){animation-delay:.3s}
    @keyframes bar{0%,100%{height:4px}50%{height:14px}}
    .tr-info{flex:1;min-width:0}
    .tr-name{font-size:18px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tr-desc{font-size:14px;color:var(--t3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .track-row.locked .tr-name{opacity:.5}
    .tr-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
    .tr-dur{font-family:var(--fm);font-size:13px;color:var(--t3)}
    .badge-free{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#2E7D4F;background:#E6F4ED;padding:3px 8px;border-radius:6px;border:1px solid #B4DFC7}
    .badge-rec{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--gold);background:var(--gold-bg);padding:3px 8px;border-radius:6px;border:1px solid var(--gold-lt)}
    .tr-lock{width:24px;height:24px;border-radius:50%;background:var(--gold-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--gold-lt)}
    .tr-lock svg{width:10px;height:10px;stroke:var(--gold);fill:none;stroke-width:2}

    /* ── BINAURAL TAB ── */
    .bin-intro{
      font-size:15px;color:var(--t2);line-height:1.65;
      padding:16px 18px;border-radius:var(--r-md);margin-bottom:18px;
      border-top:1px solid rgba(255,255,255,.65);
      border-left:1px solid rgba(255,255,255,.45);
      border-right:1px solid rgba(22,19,12,.09);
      border-bottom:1px solid rgba(22,19,12,.11);
      background:var(--s2);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
    }
    .bin-modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .bmode{
      padding:18px;border-radius:var(--r-md);
      border-top:1px solid rgba(255,255,255,.65);
      border-left:1px solid rgba(255,255,255,.45);
      border-right:1px solid rgba(22,19,12,.09);
      border-bottom:1px solid rgba(22,19,12,.12);
      background:var(--surface);cursor:pointer;transition:all .2s var(--ease);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 2px 8px rgba(22,19,12,.07);
    }
    .bmode:hover{background:var(--s2);transform:translateY(-2px);box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 6px 16px rgba(22,19,12,.1)}
    .bmode:active{transform:translateY(1px)}
    .bmode.active{
      background:var(--t1);
      border-color:var(--t1);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.12),inset 0 -2px 0 rgba(0,0,0,.18),0 4px 14px rgba(22,19,12,.22);
    }
    .bmode.active .bmt,.bmode.active .bmd{color:#fff}
    .bmt{font-size:15px;font-weight:600;color:var(--t1);margin-bottom:5px}
    .bmd{font-size:13px;color:var(--t3);line-height:1.5}
    .bmode.active .bmd{color:rgba(255,255,255,.6)}
    .bwave-grid-lg{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:16px}
    .bwl{
      padding:16px 6px;border-radius:var(--r-md);
      border-top:1px solid rgba(255,255,255,.65);
      border-left:1px solid rgba(255,255,255,.45);
      border-right:1px solid rgba(22,19,12,.09);
      border-bottom:1px solid rgba(22,19,12,.12);
      background:var(--surface);text-align:center;cursor:pointer;
      transition:all .2s var(--ease);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 1px 4px rgba(22,19,12,.07);
    }
    .bwl:hover{background:var(--s2);transform:translateY(-2px);box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 6px 14px rgba(22,19,12,.1)}
    .bwl:active{transform:translateY(1px);box-shadow:var(--btn-sh-active)}
    .bwl.active{
      background:var(--t1);border-color:var(--t1);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.1),inset 0 -2px 0 rgba(0,0,0,.18),0 4px 12px rgba(22,19,12,.2);
    }
    .bwl.active .bwln,.bwl.active .bwlh,.bwl.active .bwld{color:#fff}
    .bwl.active .bwld{color:rgba(255,255,255,.6)}
    .bwln{font-size:17px;font-weight:700;color:var(--t1);margin-bottom:3px}
    .bwlh{font-family:var(--fm);font-size:12px;color:var(--gold);margin-bottom:5px}
    .bwld{font-size:12px;color:var(--t3);line-height:1.4}
    .bwl.locked .bwln{filter:blur(3px)}
    .warn-box{
      display:flex;align-items:flex-start;gap:10px;padding:14px 16px;
      border-radius:var(--r-sm);background:#FFFBEB;
      border:1px solid #FDE68A;font-size:14px;color:#92400E;line-height:1.5;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
    }
    .warn-box svg{width:15px;height:15px;stroke:#D97706;fill:none;stroke-width:2;flex-shrink:0;margin-top:2px}

    /* ── NOTE SCIENTIFICA ── */
    .sci-note{
      margin-top:44px;padding:20px 24px;border-radius:var(--r-md);
      border-top:1px solid rgba(255,255,255,.65);
      border-left:1px solid rgba(255,255,255,.45);
      border-right:1px solid rgba(22,19,12,.09);
      border-bottom:1px solid rgba(22,19,12,.12);
      background:var(--surface);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 2px 8px rgba(22,19,12,.06);
    }
    .sci-note p{font-size:14px;color:var(--t3);line-height:1.75}
    .sci-note strong{color:var(--t2);font-weight:500}

    /* ── MODALS ── */
    .modal-bg{position:fixed;inset:0;background:rgba(24,21,14,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px;overflow-y:auto;animation:fin .2s ease}
    @keyframes fin{from{opacity:0}to{opacity:1}}
    .modal-card{background:var(--surface);border-radius:var(--r-xl);border:1px solid var(--bd);box-shadow:var(--sh-lg);padding:34px;max-width:500px;width:100%;position:relative;animation:sup .28s ease}
    @keyframes sup{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-x{position:absolute;top:18px;right:18px;width:30px;height:30px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:18px;transition:all .18s var(--ease)}
    .modal-x:hover{background:var(--s3);color:var(--t1)}
    .m-eyebrow{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
    .m-title{font-family:var(--fd);font-size:30px;font-weight:600;color:var(--t1);margin-bottom:7px;line-height:1.15}
    .m-sub{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:24px}
    .feat-list{display:flex;flex-direction:column;gap:11px;margin-bottom:24px}
    .feat{display:flex;align-items:flex-start;gap:10px}
    .feat-ck{width:18px;height:18px;border-radius:50%;background:var(--t1);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .feat-ck svg{width:9px;height:9px;stroke:#fff;fill:none;stroke-width:2.5}
    .feat-tx{font-size:13px;color:var(--t2);line-height:1.5}
    .feat-tx strong{color:var(--t1);font-weight:500}
    .price-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
    .po{padding:16px 12px;border-radius:var(--r-md);border:1.5px solid var(--bd-md);text-align:center;cursor:pointer;transition:all .2s var(--ease)}
    .po:hover{border-color:var(--t1)}
    .po.best{background:var(--t1);border-color:var(--t1)}
    .po.sel{border-color:var(--t1)}
    .po-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:8px}
    .po.best .po-l,.po.best .po-p,.po.best .po-per,.po.best .po-sv{color:#fff}
    .po-p{font-family:var(--fd);font-size:26px;font-weight:600;color:var(--t1);line-height:1}
    .po-per{font-size:11px;color:var(--t3);margin-top:3px}
    .po-sv{font-size:10px;font-weight:600;color:#2E7D4F;margin-top:5px}
    .po.best .po-sv{color:#6EE7A0}
    .up-cta{width:100%;padding:15px;border-radius:var(--r-md);background:var(--t1);color:#fff;font-size:15px;font-weight:600;letter-spacing:.02em;transition:all .2s var(--ease)}
    .up-cta:hover{opacity:.86;transform:translateY(-1px)}
    .m-fn{text-align:center;font-size:11px;color:var(--t3);margin-top:12px}

    .timer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:18px}
    .t-opt{padding:14px;border-radius:var(--r-md);border:1px solid var(--bd-md);background:var(--s2);text-align:center;cursor:pointer;font-size:14px;font-weight:500;color:var(--t1);transition:all .18s var(--ease);position:relative}
    .t-opt:hover{background:var(--s3)}
    .t-opt.sel{background:var(--t1);border-color:var(--t1);color:#fff}
    .t-lk{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center}
    .t-lk svg{width:8px;height:8px;stroke:#fff;fill:none;stroke-width:2}

    /* Play hint overlay — visibile solo quando non si riproduce nulla */
    .play-hint{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:rgba(22,19,12,.28);
      backdrop-filter:blur(1px);
      z-index:7;cursor:pointer;
      transition:opacity .3s ease;
    }
    .play-hint:hover{background:rgba(22,19,12,.35)}
    .play-hint-circle{
      width:64px;height:64px;border-radius:50%;
      background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.5);
      display:flex;align-items:center;justify-content:center;
      margin-bottom:12px;
      transition:transform .2s ease,background .2s;
    }
    .play-hint:hover .play-hint-circle{transform:scale(1.08);background:rgba(255,255,255,.25)}
    .play-hint-circle svg{width:24px;height:24px;fill:white;margin-left:4px}
    .play-hint-text{
      font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
      color:rgba(255,255,255,.85);letter-spacing:.06em;text-transform:uppercase;
    }
    .fi-wrap{
      margin-bottom:28px;
      animation:fi-in .35s cubic-bezier(.4,0,.2,1);
    }
    @keyframes fi-in{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
    .fi-card{
      display:flex;gap:0;
      border-radius:14px;
      border-top:1px solid rgba(255,255,255,.68);
      border-left:3px solid var(--fi-color,var(--t1));
      border-right:1px solid rgba(22,19,12,.09);
      border-bottom:1px solid rgba(22,19,12,.12);
      background:var(--surface);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 2px 10px rgba(22,19,12,.07);
      overflow:hidden;
      transition:border-left-color .4s ease,background .4s ease;
    }
    /* Left Hz column */
    .fi-left{
      display:flex;flex-direction:column;justify-content:center;align-items:flex-start;
      padding:18px 20px;
      min-width:100px;
      border-right:1px solid rgba(22,19,12,.06);
      flex-shrink:0;
    }
    .fi-hz{
      font-family:'Inter',sans-serif;font-size:36px;font-weight:700;
      color:var(--fi-color,var(--t1));line-height:1;margin-bottom:4px;
      transition:color .4s ease;
    }
    .fi-hz-unit{font-size:14px;font-weight:400;opacity:.7}
    .fi-name{
      font-family:'Inter',sans-serif;font-size:10px;font-weight:600;
      letter-spacing:.14em;text-transform:uppercase;color:var(--t3);
    }
    /* Center description column */
    .fi-center{
      flex:1;padding:16px 20px;min-width:0;
      border-right:1px solid rgba(22,19,12,.06);
    }
    .fi-title{
      font-family:'Inter',sans-serif;font-size:13px;font-weight:700;
      color:var(--fi-color,var(--t1));margin-bottom:5px;
      transition:color .4s ease;
    }
    .fi-body{
      font-size:14px;color:var(--t2);line-height:1.62;
      margin-bottom:10px;
    }
    .fi-moods{display:flex;gap:5px;flex-wrap:wrap}
    .fi-mood{
      font-size:11px;font-weight:500;letter-spacing:.04em;
      color:var(--fi-color,var(--t2));
      border:1px solid var(--fi-color,var(--bd-md));
      padding:2px 9px;border-radius:4px;opacity:.72;
      transition:color .4s,border-color .4s;
    }
    /* Right Abbina column */
    .fi-right{
      padding:16px 18px;flex-shrink:0;width:190px;
    }
    .fi-abbina-label{
      font-family:'Inter',sans-serif;font-size:10px;font-weight:600;
      letter-spacing:.14em;text-transform:uppercase;
      color:var(--t3);margin-bottom:9px;
      display:flex;align-items:center;gap:6px;
    }
    .fi-abbina-label::before{
      content:'';display:inline-block;
      width:10px;height:1px;background:var(--t3);
    }
    .fi-tracks{display:flex;flex-direction:column;gap:5px}
    .fi-track{
      display:flex;align-items:center;gap:8px;
      font-size:13px;font-weight:500;color:var(--t2);
      cursor:pointer;transition:color .15s;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .fi-track:hover{color:var(--fi-color,var(--t1))}
    .fi-track-dot{
      width:5px;height:5px;border-radius:50%;
      background:var(--fi-color,var(--t3));
      flex-shrink:0;opacity:.55;transition:opacity .15s;
    }
    .fi-track:hover .fi-track-dot{opacity:1}

    /* Mobile: stack columns */
    @media(max-width:640px){
      .fi-card{flex-direction:column;gap:0}
      .fi-left{flex-direction:row;align-items:baseline;gap:10px;padding:14px 16px 10px;border-right:none;border-bottom:1px solid rgba(22,19,12,.06);min-width:auto}
      .fi-center{padding:12px 16px;border-right:none}
      .fi-body{font-size:12px}
      .fi-right{display:none}
    }

    /* ═══════════════════════════════════
       RESPONSIVE — Mobile First
    ═══════════════════════════════════ */

    /* ── Tablet: 900px ── */
    @media(max-width:900px){
      .grid{grid-template-columns:1fr}
      .hz-grid{grid-template-columns:repeat(3,1fr)}
      .bwave-grid-lg{grid-template-columns:repeat(3,1fr)}
      .bwave-row{grid-template-columns:repeat(5,1fr)}
      .obj-grid{grid-template-columns:repeat(3,1fr)}
    }

    /* ── Mobile: 640px ── */
    @media(max-width:640px){
      /* Layout */
      .wrap{padding:0 14px 100px}

      /* Header */
      .hd{padding:14px 0 0;margin-bottom:16px}
      .hd-logo-row{padding-bottom:14px;margin-bottom:10px}
      .hd-pill-row{margin-bottom:18px}
      .logo-text{font-size:42px;letter-spacing:8px}
      .logo-sub{display:none}
      .plan-pill{font-size:10px;padding:6px 12px}
      .sleep-pill{font-size:10px;padding:4px 10px}

      /* Hz grid — 3 colonne su mobile, numeri più compatti */
      .hz-grid{grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px}
      .hz-card{padding:16px 8px 12px}
      .hz-card-num{font-size:26px;margin-bottom:5px}
      .hz-card-desc{font-size:9px}
      .hz-rec{font-size:7px;padding:1px 6px}

      /* Grid: player sopra, lista sotto */
      .grid{grid-template-columns:1fr;gap:16px}

      /* Player art più bassa su mobile */
      .art{height:160px}
      .art-name{font-size:15px;bottom:12px;left:14px;letter-spacing:.1em}
      .art-hz{font-size:9px;top:10px;right:10px;padding:2px 7px}
      .art-obj{font-size:8px;top:10px;left:10px;padding:2px 7px}

      /* Player body */
      .pbody{padding:16px 18px}
      .p-title{font-size:20px}
      .p-desc{font-size:12px}

      /* Controls più spaziosi per touch */
      .ctrl-row{gap:12px;margin-bottom:10px}

const checkPremiumStatus = async (uid) => {
  if (!db || !uid) return { isPremium: false, isTrial: false, trialDaysLeft: 0 };
  try {
    const doc = await db.collection('users').doc(uid).get();
    if (!doc.exists) {
      // Nuovo utente — crea record con trial
      const now = firebase.firestore.Timestamp.now();
      const trialEnd = new Date();
      trialEnd.setDate(trialEnd.getDate() + TRIAL_DAYS);
      await db.collection('users').doc(uid).set({
        createdAt:    now,
        trialEnd:     firebase.firestore.Timestamp.fromDate(trialEnd),
        isPremium:    false,
        plan:         'free',
      });
      return { isPremium: false, isTrial: true, trialDaysLeft: TRIAL_DAYS };
    }
    const data = doc.data();
    const now = new Date();
    const trialEnd = data.trialEnd?.toDate();
    const isTrial = trialEnd ? now < trialEnd : false;
    const trialDaysLeft = trialEnd
      ? Math.max(0, Math.ceil((trialEnd - now) / (1000 * 60 * 60 * 24)))
      : 0;
    return {
      isPremium:    data.isPremium === true,
      isTrial,
      trialDaysLeft,
      plan:         data.plan || 'free',
    };
  } catch(e) {
    console.warn('Firestore error:', e.message);
    return { isPremium: false, isTrial: false, trialDaysLeft: 0 };

/* ─── WAVEFORM — Firma armonica unica per ogni Hz ─── */

// Ogni Hz ha una firma visiva basata sulle sue proprietà armoniche
const HZ_WAVE = {
  174: { h:[1,.25,.08],       a:[22, 7, 3],   period:5,  // Sub-basso: lenta, ampia, pochi armonici
          phase:[0,1.1,2.2],  sub:[1,.15],    sa:[14,4]  },
  285: { h:[1,.4,.2,.07],     a:[19, 9, 5,2], period:6,
          phase:[0,.8,1.7,2.5],sub:[1,.2],    sa:[12,3]  },
  396: { h:[1,.55,.3,.1],     a:[17,10, 6,3], period:7,
          phase:[0,.7,1.5,2.3],sub:[1,.3],    sa:[11,4]  },
  417: { h:[1,.6,.35,.15,.05],a:[15,10, 6,3,1],period:7,
          phase:[0,.6,1.3,2.1,2.8],sub:[1,.35],sa:[10,4] },
  432: { h:[1,.5,.25,.1],     a:[14, 8, 5,2], period:8,  // Accordatura naturale: armoniosa
          phase:[0,Math.PI/3,Math.PI*2/3,Math.PI],sub:[1,.25],sa:[9,3] },
  528: { h:[1,.618,.382,.236,.146],a:[13,9,6,4,2],period:9,  // Golden ratio harmonics
          phase:[0,.628,1.256,1.885,2.513],sub:[1,.4],sa:[9,4] },
  639: { h:[1,.75,.55,.35,.2,.08],a:[12,10,7,5,3,1],period:10,
          phase:[0,.5,1.1,1.7,2.4,3.0],sub:[1,.45],sa:[8,4] },
  741: { h:[1,.85,.65,.45,.28,.14,.05],a:[11,10,8,6,4,2,1],period:11,
          phase:[0,.45,1.0,1.6,2.2,2.8,3.4],sub:[1,.5],sa:[7,3] },
  852: { h:[1,.9,.75,.6,.45,.3,.15,.06],a:[10,9,8,7,5,4,2,1],period:12,
          phase:[0,.4,.9,1.4,2.0,2.6,3.2,3.8],sub:[1,.55],sa:[7,3] },
  963: { h:[1,.95,.82,.68,.52,.38,.22,.1,.04],a:[9,9,8,7,6,4,3,1,1],period:13,
          phase:[0,.35,.8,1.3,1.9,2.5,3.1,3.7,4.3],sub:[1,.6],sa:[6,3] },
};

const WaveArt = ({ color, isPlaying, trackName, hz, objective, onPlayHint }) => {
  const sig = HZ_WAVE[hz] || HZ_WAVE[528];

  // Genera path con firma armonica univoca per questo Hz
  const genPath = React.useCallback((scaleAmp = 1, phaseShift = 0) => {
    const W = 1600, H = 220, cy = H / 2;
    const steps = 500;
    let d = '';
    for (let i = 0; i <= steps; i++) {
      const x = (i / steps) * W;
      const t = (i / steps) * Math.PI * sig.period * 2 + phaseShift;
      // Envelope: leggermente modulato per evitare aspetto meccanico
      const env = 1 - 0.15 * Math.cos((i / steps) * Math.PI * 2);
      let y = cy;
      sig.h.forEach((amp, idx) => {
        y += scaleAmp * env * sig.a[idx] * Math.sin(t * (idx + 1) * amp + sig.phase[idx]);
      });
      d += i === 0 ? `M${x},${y}` : ` L${x},${y}`;
    }
    return d;
  }, [hz]);

  const pathMain  = React.useMemo(() => genPath(1, 0),          [hz]);
  const pathSub   = React.useMemo(() => genPath(sig.sub[0]*.55, 1.047), [hz]);
  const pathGhost = React.useMemo(() => genPath(sig.sub[1]*.3,  2.094), [hz]);

  // Grid oscilloscopio
  const gridLines = React.useMemo(() => {
    const lines = [], W = 400, H = 220;
    [1,2,3].forEach(i => {
      const y = (i/4)*H, mid = i===2;
      lines.push(<line key={`h${i}`} x1="0" y1={y} x2={W} y2={y}
        stroke={`rgba(255,255,255,${mid?.14:.06})`} strokeWidth={mid?.8:.5}/>);
    });
    [1,2,3,4,5].forEach(i => {
      const x = (i/6)*W;
      lines.push(<line key={`v${i}`} x1={x} y1="0" x2={x} y2={H}
        stroke="rgba(255,255,255,.05)" strokeWidth=".5"/>);
      lines.push(<line key={`t${i}`} x1={x} y1={H/2-4} x2={x} y2={H/2+4}
        stroke="rgba(255,255,255,.18)" strokeWidth=".8"/>);
    });
    return lines;
  }, []);

  return (
    <div className="art">
      <div className="art-bg" style={{ background: color }} />
      <div className="art-scan" />
      <div className="art-vig" />
      <div className="art-grid">
        <svg viewBox="0 0 400 220" preserveAspectRatio="none">{gridLines}</svg>
      </div>
      <div className={`art-wave ${isPlaying ? 'playing' : ''}`}>
        <svg viewBox="0 0 400 220" preserveAspectRatio="none">
          <g className="wv-scroll-b"><path className="wv-ghost" d={pathGhost}/></g>
          <g className="wv-scroll-b"><path className="wv-sub"   d={pathSub}/></g>
          <g className="wv-scroll">  <path className="wv-main"  d={pathMain}/></g>
        </svg>
      </div>
      {objective && <div className="art-obj">{OBJECTIVES[objective].label}</div>}
      <div className="art-name">{trackName}</div>
      <div className="art-hz">{hz} Hz</div>
      <div className="art-glow" style={{ background: color }} />
      {/* Play hint — visibile solo quando non suona */}
      {!isPlaying && (
        <div className="play-hint" onClick={onPlayHint}>
          <div className="play-hint-circle">
            <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
          <div className="play-hint-text">Inizia ad ascoltare</div>
        </div>
      )}
    </div>
  );
};
